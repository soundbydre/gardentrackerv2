  };
  const deleteTodo=async(id)=>{
    await db2.deleteTodo(id);
    setTodos(ts=>ts.filter(t=>t.id!==id));
  };
  const editTodo=async(id,text,due)=>{
    await db2.updateTodo(id,{text,due_date:due||null});
    setTodos(ts=>ts.map(t=>t.id===id?{...t,text,due:due||null}:t));
  };

  const seenSuccBadge=new Set();
  const taskCount=active.reduce((acc,c)=>{
    const s=c.feedSchedules||{};const fl=c.feedLog||[];
    const overdueFeeds=Object.entries(s).filter(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);}).length;
    let ss=0;
    if(c.successionDays&&c.seedDate){
      const groupKey=`${c.name}::${c.variety}`;
      if(!seenSuccBadge.has(groupKey)){
        seenSuccBadge.add(groupKey);
        const sameCrops=active.filter(x=>x.name===c.name&&x.variety===c.variety&&x.successionDays&&Number(x.successionDays)===Number(c.successionDays)&&x.seedDate);
        const allSameVariety=active.filter(x=>x.name===c.name&&x.variety===c.variety&&x.seedDate);
        const latestSeedDate=allSameVariety.map(x=>x.seedDate).sort().pop()||c.seedDate;
        if(daysUntil(succDate(latestSeedDate,c.successionDays))<=7) ss=1;
      }
    }
    return acc+overdueFeeds+ss;
  },0)+todos.filter(t=>!t.done).length;

  const syncedCrop=selCrop?crops.find(c=>c.id===selCrop.id)||selCrop:null;

  const overdueFeeds=active.reduce((acc,c)=>{const s=c.feedSchedules||{};const fl=c.feedLog||[];return acc+Object.entries(s).filter(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);}).length;},0);
  const totalAlerts=taskCount+overdueFeeds;
  return(
    <div style={{width:"100%",height:"100%",background:C.bg,color:"white",display:"flex",flexDirection:"column",overflow:"hidden",position:"fixed",top:0,left:0,right:0,bottom:0}}>
      {/* ── Fixed header ── */}
      <div style={{flexShrink:0,padding:"max(54px,calc(var(--sat, env(safe-area-inset-top, 50px)) + 16px)) 18px 12px",background:C.bg}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            {zone&&<div style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.18em",color:C.greenFg,textTransform:"uppercase",marginBottom:"4px",opacity:0.7}}>Zone {zone}</div>}
            <h1 style={{fontFamily:F.serif,fontSize:"1.85rem",margin:0,color:"white",fontWeight:700,lineHeight:1}}>{gardenName}</h1>
            <div style={{fontSize:"0.78rem",color:C.dashSub,marginTop:"5px"}}>{active.length} active crop{active.length!==1?"s":""}{activeLocs.length>0?` · ${activeLocs.length} location${activeLocs.length!==1?"s":""}`:""}</div>
          </div>
          {/* Right: logo top-aligned, icon buttons beside it */}
          <div style={{display:"flex",alignItems:"flex-start",gap:8,flexShrink:0,marginTop:4}}>
            {/* Search + layout toggle — vertically centred against logo */}
            <div style={{display:"flex",gap:8,alignItems:"center",marginTop:5}}>
              <button onClick={()=>setShowSearch(true)} aria-label="Search crops" style={{width:34,height:34,borderRadius:"10px",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5" stroke="rgba(232,245,233,0.55)" strokeWidth="1.6"/><path d="M11.5 11.5L16 16" stroke="rgba(232,245,233,0.55)" strokeWidth="1.6" strokeLinecap="round"/></svg>
              </button>
              <button onClick={()=>setFlatView(f=>!f)} aria-label={`Switch to ${flatView?"location":"flat"} view`} style={{width:34,height:34,borderRadius:"10px",background:flatView?"rgba(134,239,172,0.15)":"rgba(255,255,255,0.07)",border:`1px solid ${flatView?"rgba(134,239,172,0.3)":"rgba(255,255,255,0.1)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                {flatView?(
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="3" rx="1" fill="rgba(134,239,172,0.8)"/><rect x="1" y="7" width="14" height="3" rx="1" fill="rgba(134,239,172,0.8)"/><rect x="1" y="12" width="14" height="3" rx="1" fill="rgba(134,239,172,0.8)"/></svg>
                ):(
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="rgba(232,245,233,0.45)"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="rgba(232,245,233,0.45)"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="rgba(232,245,233,0.45)"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="rgba(232,245,233,0.45)"/></svg>
                )}
              </button>
            </div>
            {/* Logo — same top-right position as other panels */}
            <div style={{position:"relative"}}>
              <img src={ICON_SRC} alt="Garden Tracker" style={{width:"44px",height:"44px",borderRadius:"11px",objectFit:"cover",boxShadow:"0 0 0 2px rgba(134,239,172,0.22)",display:"block"}}/>
            </div>
          </div>
        </div>
      </div>

      {/* ── Search overlay ── */}
      {showSearch&&(
        <div style={{position:"absolute",inset:0,background:"rgba(14,21,14,0.97)",zIndex:300,display:"flex",flexDirection:"column",padding:"max(54px,calc(var(--sat, env(safe-area-inset-top, 50px)) + 16px)) 16px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,background:"rgba(255,255,255,0.08)",borderRadius:"14px",padding:"10px 14px",border:"1px solid rgba(255,255,255,0.12)",marginBottom:16}}>
            <svg width="16" height="16" viewBox="0 0 18 18" fill="none" style={{flexShrink:0}}><circle cx="7.5" cy="7.5" r="5" stroke="rgba(232,245,233,0.4)" strokeWidth="1.6"/><path d="M11.5 11.5L16 16" stroke="rgba(232,245,233,0.4)" strokeWidth="1.6" strokeLinecap="round"/></svg>
            <input autoFocus value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Search crops..." style={{flex:1,background:"none",border:"none",outline:"none",color:"white",fontSize:"16px"}}/>
            <button onClick={()=>{setShowSearch(false);setSearchQuery("");}} style={{background:"none",border:"none",color:"rgba(232,245,233,0.4)",fontSize:"1.1rem",cursor:"pointer",padding:"2px",lineHeight:1,flexShrink:0}}>×</button>
          </div>
          <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
            {searchQuery?(()=>{
              const q=searchQuery.toLowerCase();
              const results=active.filter(c=>c.name?.toLowerCase().includes(q)||c.variety?.toLowerCase().includes(q)||c.location?.toLowerCase().includes(q)||c.stage?.toLowerCase().includes(q));
              return(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(134,239,172,0.5)",marginBottom:2}}>{results.length} result{results.length!==1?"s":""}</div>
                  {results.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No crops match "{searchQuery}"</div>}
                  {results.map(c=>(
                    <NewCropCard key={c.id} crop={c}
                      onTap={()=>{setSelCrop(c);setSelLoc(c.location);setView("crop");setShowSearch(false);setSearchQuery("");}}
                      onWater={()=>waterCrop(c.id)}
                      onFeed={()=>{setSelCrop(c);setSelLoc(c.location);setView("crop");setDashFeedCrop(c.id);setShowSearch(false);setSearchQuery("");}}
                    />
                  ))}
                </div>
              );
            })():(
              <div style={{textAlign:"center",padding:"4rem 0",color:"rgba(255,255,255,0.2)"}}>
                <div style={{fontSize:"2rem",marginBottom:8}}>🔍</div>
                <div style={{fontSize:"0.9rem"}}>Type to search your crops</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Scrollable body ── */}
      <div style={{flex:1,minHeight:0,overflowY:"auto",overflowX:"hidden",WebkitOverflowScrolling:"touch",paddingBottom:"16px"}}>
        <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:"10px"}}>

          {/* ── Weather recommendation (always shown when loaded) ── */}
          {(weatherRec||weatherRecLoading)&&(
            <div style={{background:"rgba(23,37,84,0.5)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:"14px",padding:"11px 13px",display:"flex",alignItems:"flex-start",gap:10}}>
              {weatherRecLoading?(
                <>
                  <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:1,display:"inline-block",animation:"spin 1s linear infinite"}}>⟳</span>
                  <span style={{fontSize:"0.82rem",color:"rgba(147,197,253,0.45)",fontStyle:"italic"}}>Reading today's conditions...</span>
                </>
              ):(
                <>
                  <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:1}}>🌤</span>
                  <span style={{fontSize:"0.82rem",color:"#93c5fd",lineHeight:1.5}}>{weatherRec}</span>
                </>
              )}
            </div>
          )}

          {/* ── Alerts card (hidden when no alerts) ── */}
          {(()=>{
            const alertItems=[];
            // Feed schedule overdue
            active.forEach(c=>{
              const s=c.feedSchedules||{};const fl=c.feedLog||[];
              Object.entries(s).forEach(([n,d])=>{
                const l=[...fl].reverse().find(f=>f.nutrient===n);
                const days=l?daysAgo(l.date):null;
                const freq=scheduleDays(d);
                if(days!==null&&days>=freq) alertItems.push({icon:"🌿",text:`${c.variety||c.name} — ${n} overdue`,sub:`${days-freq+1}d overdue`,urgency:0,nav:"todo"});
              });
            });
            // Succession sowing overdue/due
            const seenSuccA=new Set();
            active.forEach(c=>{
              if(!c.successionDays||!c.seedDate) return;
              const gk=`${c.name}::${c.variety}`;
              if(seenSuccA.has(gk)) return;
              seenSuccA.add(gk);
              const allSame=active.filter(x=>x.name===c.name&&x.variety===c.variety&&x.seedDate);
              const latest=allSame.map(x=>x.seedDate).sort().pop()||c.seedDate;
              const next=succDate(latest,c.successionDays);
              const diff=daysUntil(next);
              if(diff!==null&&diff<=0) alertItems.push({icon:"🌱",text:`Sow ${c.variety||c.name}`,sub:diff<0?`${Math.abs(diff)}d overdue`:"Due today",urgency:0,nav:"todo"});
            });
            // Todos overdue
            todos.filter(t=>!t.done&&t.due&&daysUntil(t.due)<=0).forEach(t=>{
              const diff=daysUntil(t.due);
              alertItems.push({icon:"✓",text:t.text,sub:diff<0?`${Math.abs(diff)}d overdue`:"Due today",urgency:1,nav:"todo"});
            });
            if(!alertItems.length) return null;
            alertItems.sort((a,b)=>a.urgency-b.urgency);
            const first=alertItems[0];
            const rest=alertItems.slice(1);
            return(
              <div style={{background:"rgba(120,53,15,0.45)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:"14px",overflow:"hidden"}}>
                {/* Header row — this IS the collapsed state */}
                <button onClick={()=>setAlertsCollapsed(v=>!v)} aria-label={alertsCollapsed?"Expand alerts":"Collapse alerts"} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:"none",border:"none",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:"#fbbf24",flexShrink:0}}/>
                    <span style={{fontSize:"0.68rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#fbbf24"}}>
                      {alertsCollapsed?`${alertItems.length} alert${alertItems.length!==1?"s":""}`:(`Alerts · ${alertItems.length}`)}
                    </span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:"0.72rem",color:"rgba(251,191,36,0.45)"}}>{alertsCollapsed?"show":"hide"}</span>
                    <div style={{width:18,height:18,borderRadius:"5px",background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{transform:alertsCollapsed?"rotate(0deg)":"rotate(180deg)",transition:"transform 0.2s"}}><path d="M2 3.5L5 6.5L8 3.5" stroke="#fbbf24" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </div>
                  </div>
                </button>
                {/* All alert rows — only shown when expanded */}
                {!alertsCollapsed&&(
                  <>
                    {alertItems.map((item,i)=>(
                      <div key={i} onClick={item.nav?()=>setView(item.nav):undefined} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderTop:"1px solid rgba(245,158,11,0.1)",cursor:item.nav?"pointer":"default"}}>
                        <span style={{fontSize:"0.85rem",flexShrink:0}}>{item.icon}</span>
                        <span style={{fontSize:"0.82rem",color:"rgba(232,245,233,0.8)",flex:1,lineHeight:1.3}}>{item.text}</span>
                        <span style={{fontSize:"0.72rem",color:item.nav?"rgba(251,191,36,0.5)":"rgba(232,245,233,0.35)",flexShrink:0,whiteSpace:"nowrap"}}>{item.nav?"›  "+item.sub:item.sub}</span>
                      </div>
                    ))}
                    <div style={{height:4}}/>
                  </>
                )}
              </div>
            );
          })()}

          {/* ── Crop list: location-grouped (default) or flat ── */}
          {active.length===0&&orphanedCrops.length===0?(
            <div style={{textAlign:"center",padding:"5rem 0",color:"rgba(255,255,255,0.2)"}}>
              <div style={{fontSize:"3rem",marginBottom:"12px"}}>🌱</div>
              <div style={{fontSize:"0.95rem",marginBottom:"6px"}}>No crops logged yet.</div>
              <div style={{fontSize:"0.78rem",opacity:0.7}}>Tap + Add Crop to get started.</div>
            </div>
          ):flatView?(
            // ── Flat list view ──
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:2,paddingBottom:4}}>
                <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(134,239,172,0.5)"}}>All crops</div>
                <div style={{display:"flex",gap:5}}>
                  {[{id:"az",label:"A–Z"},{id:"newest",label:"Newest"},{id:"oldest",label:"Oldest"},{id:"stage",label:"Stage"},{id:"feed",label:"Feed"}].map(opt=>(
                    <button key={opt.id} onClick={()=>setFlatSort(opt.id)} style={{padding:"3px 9px",borderRadius:"20px",border:`1px solid ${flatSort===opt.id?"rgba(134,239,172,0.4)":"rgba(255,255,255,0.1)"}`,background:flatSort===opt.id?"rgba(134,239,172,0.12)":"transparent",color:flatSort===opt.id?"rgba(134,239,172,0.9)":"rgba(232,245,233,0.35)",fontSize:"0.68rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
              {(()=>{
                const labelNum=s=>{const m=(s||"").match(/(\d+)\s*$/);return m?Number(m[1]):null;};
                const labelCompare=(a,b)=>{const an=labelNum(a.label),bn=labelNum(b.label);if(an!==null&&bn!==null&&an!==bn) return an-bn;return (a.label||"").localeCompare(b.label||"");};
                return [...active].sort((a,b)=>{
                  if(flatSort==="az"){const c=(a.variety||a.name).localeCompare(b.variety||b.name);return c!==0?c:labelCompare(a,b);}
                  if(flatSort==="newest"){const c=(b.seedDate||"").localeCompare(a.seedDate||"");return c!==0?c:labelCompare(a,b);}
                  if(flatSort==="oldest"){const c=(a.seedDate||"").localeCompare(b.seedDate||"");return c!==0?c:labelCompare(a,b);}
                  if(flatSort==="stage"){const c=STAGE_ORDER.indexOf(a.stage)-STAGE_ORDER.indexOf(b.stage);return c!==0?c:labelCompare(a,b);}
                  if(flatSort==="feed"){
                    const isOverdue=x=>{const fs=x.feedSchedules||{};const fl=x.feedLog||[];return Object.keys(fs).length>0&&Object.keys(fs).some(n=>{const d=fs[n];const l=[...fl].reverse().find(f=>f.nutrient===n);return !l||daysAgo(l.date)>=scheduleDays(d);});};
                    const overdueA=isOverdue(a)?1:0, overdueB=isOverdue(b)?1:0;
                    if(overdueA!==overdueB) return overdueB-overdueA;
                    const latestFed=x=>{const fl=x.feedLog||[];if(!fl.length) return 999;const sorted=[...fl].sort((p,q)=>parseDate(q.date)-parseDate(p.date));return daysAgo(sorted[0].date)??999;};
                    const c=latestFed(b)-latestFed(a);return c!==0?c:labelCompare(a,b);
                  }
                  return labelCompare(a,b);
                });
              })().map(c=>(
                <NewCropCard key={c.id} crop={c} sortMode={flatSort}
                  onTap={()=>{setSelCrop(c);setSelLoc(c.location);setView("crop");}}
                  onWater={()=>waterCrop(c.id)}
                  onFeed={()=>{setSelCrop(c);setSelLoc(c.location);setView("crop");setDashFeedCrop(c.id);}}
                />
              ))}
            </>
          ):(
            // ── Location-grouped view (default) ──
            <>
              {activeLocs.length>0&&(
                <div style={{paddingTop:2,paddingBottom:0}}>
                  <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(134,239,172,0.5)"}}>Your garden</div>
                </div>
              )}
              {activeLocs.map(loc=><LocCard key={loc} loc={loc} crops={crops} sort={locSorts[loc]||"az"} onLocClick={()=>setSelLocSheet(loc)} onCropClick={c=>{setSelCrop(c);setSelLoc(loc);setView("crop");}} onWaterCrop={id=>waterCrop(id)} onFeedCrop={c=>{setSelCrop(c);setSelLoc(loc);setView("crop");setDashFeedCrop(c.id);}}/>)}
            </>
          )}

          {/* ── Orphaned crops (location deleted) ── */}
          {orphanedCrops.length>0&&(
            <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"14px",padding:"12px 14px",border:"1px solid rgba(255,165,0,0.3)"}}>
              <div style={{fontSize:"0.7rem",fontWeight:700,color:"#fbbf24",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"8px"}}>⚠ Location removed</div>
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {orphanedCrops.map(c=><CropCard key={c.id} crop={c} onClick={()=>{setSelCrop(c);setSelLoc(null);setView("crop");}} onWater={waterCrop}/>)}
              </div>
            </div>
          )}

          {/* ── Season Summary card ── */}
          {(()=>{
            const yr=summaryYear;
            const inYear=d=>d&&d.startsWith(`${yr}-`);
            // Crops active during this year (started before year end, not archived before year start or still active)
            const yearCrops=crops.filter(c=>c.seedDate&&c.seedDate.startsWith(`${yr}-`)||
              (c.seedDate&&c.seedDate<`${yr+1}-01-01`&&(!c.archived||(c.stageHistory||[]).some(s=>s.date&&s.date.startsWith(`${yr}-`)))));
            const activeDuringYear=crops.filter(c=>c.seedDate&&c.seedDate<`${yr+1}-01-01`);
            const startedThisYear=crops.filter(c=>c.seedDate&&inYear(c.seedDate)).length;
            const lostThisYear=crops.filter(c=>c.stage==="Lost"&&(c.stageHistory||[]).some(s=>s.stage==="Lost"&&inYear(s.date))).length;
            // Water logs this year
            const totalWaterings=crops.reduce((n,c)=>{
              return n+(c.waterLog||[]).filter(w=>!w.auto&&inYear(w.date)).length;
            },0);
            // Rain this year
            const rainDays=new Set();
            crops.forEach(c=>(c.waterLog||[]).filter(w=>w.auto&&w.source==="rain"&&inYear(w.date)).forEach(w=>rainDays.add(w.date?.slice(0,10))));
            const totalRainDays=rainDays.size;
            // Feed logs this year
            const totalFeedings=crops.reduce((n,c)=>{
              return n+(c.feedLog||[]).filter(f=>inYear(f.date)).length;
            },0);
            // Harvests this year
            const harvestByKey={};
            crops.forEach(c=>{
              (c.harvests||[]).filter(h=>inYear(h.date)&&h.amount).forEach(h=>{
                const k=`${c.name}::${c.variety||c.name}`;
                if(!harvestByKey[k]) harvestByKey[k]={name:c.name,variety:c.variety||c.name,total:0,unit:h.unit||"g",count:0,emoji:cropEmoji(c),accent:cropAccent(c)};
                harvestByKey[k].total+=Number(h.amount);
                harvestByKey[k].count++;
              });
            });
            const harvestRows=Object.values(harvestByKey).sort((a,b)=>b.total-a.total);
            const totalHarvestLogs=harvestRows.reduce((n,r)=>n+r.count,0);
            // Stats for inline card preview
            const hasAnyData=startedThisYear>0||totalWaterings>0||totalFeedings>0||totalHarvestLogs>0;
            if(!hasAnyData) return null;
            const availableYears=[...new Set(crops.map(c=>c.seedDate?.slice(0,4)).filter(Boolean).map(Number))].sort((a,b)=>b-a);
            const currentYear=new Date().getFullYear();
            if(!availableYears.includes(currentYear)) availableYears.unshift(currentYear);
            return(
              <>
                <button onClick={()=>setShowSeasonSummary(true)} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"14px",padding:"13px 14px",cursor:"pointer",textAlign:"left"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(134,239,172,0.5)"}}>Season Summary · {yr}</div>
                    <span style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.3)"}}>view all ›</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>

                  <div>
                    <div style={{fontSize:"1.3rem",fontWeight:700,color:"white"}}>{fmtD(day.date,expandedWeatherDay)}</div>
                    <div style={{fontSize:"0.78rem",color:"rgba(186,230,253,0.45)",marginTop:2}}>{fmtDS(day.date)} · {day.info.label}</div>
                  </div>
                  <div style={{fontSize:"3rem",lineHeight:1}}>{day.info.emoji}</div>
                </div>
                {/* H / L / Rain — large and prominent */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                  <div style={{background:"rgba(255,255,255,0.1)",borderRadius:"14px",padding:"16px 10px",backdropFilter:"blur(4px)",textAlign:"center"}}>
                    <div style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(186,230,253,0.45)",marginBottom:8}}>High</div>
                    <div style={{fontSize:"2.2rem",fontWeight:800,color:"#fb923c",lineHeight:1}}>{Math.round(day.high)}°</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.1)",borderRadius:"14px",padding:"16px 10px",backdropFilter:"blur(4px)",textAlign:"center"}}>
                    <div style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(186,230,253,0.45)",marginBottom:8}}>Low</div>
                    <div style={{fontSize:"2.2rem",fontWeight:800,color:"#93c5fd",lineHeight:1}}>{Math.round(day.low)}°</div>
                  </div>
                  <div style={{background:"rgba(255,255,255,0.1)",borderRadius:"14px",padding:"16px 10px",backdropFilter:"blur(4px)",textAlign:"center"}}>
                    <div style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(186,230,253,0.45)",marginBottom:8}}>Rain</div>
                    <div style={{fontSize:"2.2rem",fontWeight:800,color:day.precipProb>30?"#60a5fa":"rgba(255,255,255,0.5)",lineHeight:1}}>{day.precipProb||0}%</div>
                  </div>
                </div>
                {/* Summary */}
                {day.summary&&<div style={{fontSize:"0.82rem",color:"rgba(186,230,253,0.6)",lineHeight:1.6,fontStyle:"italic"}}>{day.summary}</div>}
              </div>
              {/* Hourly */}
              {day.hours&&day.hours.length>0&&(
                <div style={{padding:"16px 16px"}}>
                  <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(134,239,172,0.45)",marginBottom:10}}>Hourly Forecast</div>
                  <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                    <div style={{display:"flex",gap:8,paddingBottom:8,minWidth:"max-content"}}>
                      {day.hours.filter(h=>h.hour>=6).map(h=>(
                        <div key={h.hour} style={{background:C.bgCard,borderRadius:"10px",padding:"10px",textAlign:"center",minWidth:"52px",border:"1px solid rgba(255,255,255,0.07)"}}>
                          <div style={{fontSize:"0.62rem",color:"rgba(232,245,233,0.4)",fontWeight:600,marginBottom:4}}>{h.hour===12?"12pm":h.hour<12?`${h.hour}am`:h.hour===0?"12am":`${h.hour-12}pm`}</div>
                          <div style={{fontSize:"0.9rem",marginBottom:2}}>{decodeWMO(h.code).emoji}</div>
                          <div style={{fontSize:"0.82rem",fontWeight:700,color:"white"}}>{Math.round(h.temp)}°</div>
                          <div style={{fontSize:"0.62rem",color:"rgba(186,230,253,0.5)",marginTop:2}}>{h.humidity}%</div>
                          {h.precip>10&&<div style={{fontSize:"0.62rem",color:"#93c5fd",marginTop:1}}>☔{h.precip}%</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      })()}
      <SettingsPanel show={view==="settings"} settings={settings} locations={locations} locationMeta={locationMeta} crops={crops}
        user={user} syncing={syncing}
        onSave={async(s,locs,locMeta)=>{
          // Update garden settings directly
          if(gardenId){
            await db2.updateGarden(gardenId,{name:s.gardenName,zone:s.zone,zip:s.zip});
            // Sync locations
            const toAdd=locs.filter(l=>!locations.includes(l));
            const toRemove=locations.filter(l=>!locs.includes(l));
            for(let i=0;i<locs.length;i++) await db2.upsertLocation(gardenId,locs[i],(locMeta[locs[i]]?.outdoor)!==false,i);
            for(const l of toRemove) await db2.deleteLocation(gardenId,l);
          }
          setSettings(p=>({...p,...s}));setLocations(locs);setLocationMeta(locMeta);setView("dashboard");
        }}
        onSignOut={async()=>{
          await sb.auth.signOut();
          setView("dashboard");
          setUser(null);setDbLoaded(false);
        }}
        onClose={()=>setView("dashboard")}
        onExport={()=>{
          const data={version:2,exportedAt:new Date().toISOString(),settings,locations,locationMeta,crops,todos,nutrients,cropNames,varieties,containerSizes};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;
          a.download=`garden-tracker-backup-${todayStr()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        }}
        onImport={async(data)=>{
          if(!window.confirm(`Restore backup with ${data.crops?.length||0} crops?\n\nThis will REPLACE all current crops, locations, and todos. This cannot be undone.`)) return;
          if(!gardenId){alert("No active garden found.");return;}
          runV1Import(data,gardenId,user.id);
        }}
        onImportV1={async(data)=>{
          if(!window.confirm(`Import ${data.crops?.length||0} crops from V1 backup?\n\nThis will REPLACE all current crops, locations, and todos. This cannot be undone.`)) return;
          if(!gardenId){alert("No active garden found.");return;}
          runV1Import(data,gardenId,user.id);
        }}/>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){console.error("App crash:",e,info);}
  render(){
    if(this.state.error) return(
      <div style={{background:"#0e150e",color:"white",padding:"40px 20px",fontFamily:"sans-serif",minHeight:"100vh"}}>
        <div style={{fontSize:"2rem",marginBottom:16}}>⚠️</div>
        <div style={{fontSize:"1.1rem",fontWeight:700,marginBottom:8}}>Something went wrong</div>
        <div style={{fontSize:"0.85rem",color:"rgba(255,255,255,0.5)",marginBottom:16}}>{this.state.error.message}</div>
        <pre style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.3)",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{this.state.error.stack?.slice(0,500)}</pre>
        <button onClick={()=>window.location.reload()} style={{marginTop:20,background:"#22c55e",color:"white",border:"none",borderRadius:"10px",padding:"12px 24px",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>Reload</button>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
