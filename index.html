  const locCrops=crops.filter(c=>!c.archived&&c.location===location);
  const [confirmWaterAll,setConfirmWaterAll]=useState(false);
  const [showFeedAll,setShowFeedAll]=useState(false);
  const footer=(
    <div style={{display:"flex",gap:"8px",width:"100%"}}>
      <button onClick={()=>setConfirmWaterAll(true)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"12px 8px",borderRadius:"12px",border:"none",background:"#3b82f6",color:"white",fontSize:"0.82rem",fontWeight:700,cursor:"pointer"}}>
        💧 Water All
      </button>
      <button onClick={onAddCrop} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"12px 8px",borderRadius:"12px",border:"none",background:C.green,color:"white",fontSize:"0.82rem",fontWeight:700,cursor:"pointer",boxShadow:"0 2px 10px rgba(34,197,94,0.3)"}}>
        <span style={{fontSize:"1.1rem",lineHeight:1}}>+</span> Add Crop
      </button>
      <button onClick={()=>setShowFeedAll(true)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"12px 8px",borderRadius:"12px",border:"none",background:"#f59e0b",color:"white",fontSize:"0.82rem",fontWeight:700,cursor:"pointer"}}>
        🌿 Feed All
      </button>
    </div>
  );
  return(
    <>
    <Panel show={show} onClose={onClose} title={location} footer={footer} bottomBack>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:"10px"}}>
        {locCrops.length===0&&<div style={{textAlign:"center",padding:"3rem 0",color:C.textFaint}}><div style={{fontSize:"2.5rem",marginBottom:"8px"}}>🌱</div><div style={{fontStyle:"italic",fontSize:"0.9rem"}}>Nothing logged here yet.</div></div>}
        {locCrops.map(crop=><CropCard key={crop.id} crop={crop} onClick={()=>onCropTap(crop)} onWater={onWater}/>)}
      </div>
    </Panel>
    <ConfirmSheet show={confirmWaterAll} title="Water all crops?" message={`This will log a watering for all ${locCrops.length} crop${locCrops.length!==1?"s":""} in ${location}.`} confirmLabel="Water All" onConfirm={()=>{onWaterAll(locCrops.map(c=>c.id));setConfirmWaterAll(false);}} onCancel={()=>setConfirmWaterAll(false)}/>
    <FeedAllSheet show={showFeedAll} location={location} crops={locCrops} nutrients={nutrients} onFeedAll={(nutrient,qty,water,date,selectedIds,schedDays,schedMeta)=>onFeedAll(selectedIds||locCrops.map(c=>c.id),nutrient,qty,water,date,schedDays,schedMeta)} onClose={()=>setShowFeedAll(false)}/>
    </>
  );
}

// ── Dashboard Location Card ────────────────────────────────────
function LocCard({loc,crops,sort,onLocClick,onCropClick,onWaterCrop,onFeedCrop}) {
  const locCrops=crops.filter(c=>!c.archived&&c.location===loc);
  if(!locCrops.length) return null;
  const alerts=locCrops.filter(c=>{const s=c.feedSchedules||{};const fl=c.feedLog||[];return Object.entries(s).some(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});}).length;

  const labelNum=s=>{const m=(s||"").match(/(\d+)\s*$/);return m?Number(m[1]):null;};
  const labelCompare=(a,b)=>{
    const an=labelNum(a.label),bn=labelNum(b.label);
    if(an!==null&&bn!==null&&an!==bn) return an-bn;
    return (a.label||"").localeCompare(b.label||"");
  };
  const sorted=[...locCrops].sort((a,b)=>{
    if(sort==="az"){const c=(a.variety||a.name).localeCompare(b.variety||b.name);return c!==0?c:labelCompare(a,b);}
    if(sort==="oldest"){const c=(a.seedDate||"").localeCompare(b.seedDate||"");return c!==0?c:labelCompare(a,b);}
    if(sort==="newest"){const c=(b.seedDate||"").localeCompare(a.seedDate||"");return c!==0?c:labelCompare(a,b);}
    if(sort==="stage"){const c=STAGE_ORDER.indexOf(a.stage)-STAGE_ORDER.indexOf(b.stage);return c!==0?c:labelCompare(a,b);}
    if(sort==="feed"){
      const isOverdue=x=>{const fs=x.feedSchedules||{};const fl=x.feedLog||[];return Object.keys(fs).length>0&&Object.keys(fs).some(n=>{const d=fs[n];const l=[...fl].reverse().find(f=>f.nutrient===n);return !l||daysAgo(l.date)>=scheduleDays(d);});};
      const c=isOverdue(b)-isOverdue(a);return c!==0?c:labelCompare(a,b);
    }
    return labelCompare(a,b);
  });

  return(
    <div style={{background:C.bgCard,borderRadius:"18px",overflow:"hidden",border:`1px solid ${alerts>0?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.07)"}`,userSelect:"none"}}>
      {/* Location header */}
      <div onClick={onLocClick} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 16px 10px",cursor:"pointer"}}>
        <div>
          <div style={{fontSize:"1rem",fontWeight:700,color:"white",lineHeight:1.2}}>{loc}</div>
          <div style={{fontSize:"0.72rem",color:C.dashSub,marginTop:"2px"}}>{locCrops.length} crop{locCrops.length!==1?"s":""}</div>
        </div>
        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
          {alerts>0&&<span style={{background:"#f59e0b",color:"white",fontSize:"0.62rem",fontWeight:700,padding:"2px 7px",borderRadius:"6px"}}>⚠ {alerts}</span>}
          <span style={{color:"rgba(255,255,255,0.25)",fontSize:"0.85rem"}}>›</span>
        </div>
      </div>
      {/* Sort pills removed - sort controlled via action sheet */}
      <div style={{height:"1px",background:"rgba(255,255,255,0.06)",marginLeft:"16px"}}/>
      {/* Crop rows */}
      <div style={{display:"flex",flexDirection:"column"}}>
        {sorted.map((c,i)=>{
          const sc=STAGE_COLORS[c.stage]||STAGE_COLORS.Seed;
          const fl=c.feedLog||[];
          const fs=c.feedSchedules||{};
          const feedOverdue=Object.entries(fs).some(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});
          const manualWaters=(c.waterLog||[]).filter(w=>!w.auto||w.source!=="rain");
          const lastWater=manualWaters.length?manualWaters[manualWaters.length-1]:null;
          const daysNoWater=lastWater?daysAgo(lastWater.date):null;
          const lastFeedEntry=[...fl].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
          const daysFeed=lastFeedEntry?daysAgo(lastFeedEntry.date):null;
          const isLast=i===sorted.length-1;
          const emoji=cropEmoji(c);
          const acc=cropAccent(c);
          return(
            <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:isLast?"none":"1px solid rgba(255,255,255,0.04)"}}>
              {/* Crop icon */}
              <div onClick={()=>onCropClick(c)} style={{width:38,height:38,borderRadius:"10px",background:`${acc.from}33`,border:`1px solid ${acc.from}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.25rem",flexShrink:0,cursor:"pointer"}}>
                {emoji}
              </div>
              {/* Name + stats */}
              <div onClick={()=>onCropClick(c)} style={{flex:1,minWidth:0,cursor:"pointer"}}>
                <div style={{fontSize:"0.95rem",fontWeight:600,color:"rgba(232,245,233,0.92)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2,display:"flex",alignItems:"center",gap:6}}>
                  <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.variety||c.name}</span>
                  {c.label?<span style={{flexShrink:0,fontWeight:700,fontSize:"0.64rem",color:C.green,background:"rgba(34,197,94,0.14)",border:"1px solid rgba(34,197,94,0.3)",padding:"1px 7px",borderRadius:"6px"}}>{c.label}</span>:null}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}>
                  {sort==="stage"?(
                    <span style={{display:"flex",alignItems:"center",gap:4,background:`${sc.dot}20`,border:`1px solid ${sc.dot}35`,borderRadius:"20px",padding:"2px 7px",flexShrink:0}}>
                      <span style={{width:5,height:5,borderRadius:"50%",background:sc.dot,display:"inline-block",flexShrink:0}}/>
                      <span style={{fontSize:"0.7rem",fontWeight:600,color:sc.dot}}>{c.stage}</span>
                    </span>
                  ):sort==="feed"?(
                    daysFeed!==null?(
                      <span style={{fontSize:"0.7rem",color:feedOverdue?"#fbbf24":"rgba(232,245,233,0.4)",fontWeight:feedOverdue?600:400}}>🌿 {feedOverdue?"Overdue":daysFeed===0?"Today":daysFeed===1?"Yesterday":`${daysFeed}d ago`}</span>
                    ):(
                      <span style={{fontSize:"0.7rem",color:"rgba(232,245,233,0.25)"}}>🌿 Never fed</span>
                    )
                  ):(
                    <>
                      {daysNoWater!==null&&<span style={{fontSize:"0.7rem",color:daysNoWater===0?"#4ade80":"rgba(232,245,233,0.4)"}}>💧 {daysNoWater===0?"Today":daysNoWater===1?"Yesterday":`${daysNoWater}d ago`}</span>}
                      {daysFeed!==null&&<span style={{fontSize:"0.7rem",color:feedOverdue?"#fbbf24":"rgba(232,245,233,0.4)",fontWeight:feedOverdue?600:400}}>🌿 {feedOverdue?"Overdue":daysFeed===0?"Today":daysFeed===1?"Yesterday":`${daysFeed}d ago`}</span>}
                    </>
                  )}
                </div>
              </div>
              {/* Quick action buttons */}
              <div style={{display:"flex",gap:5,flexShrink:0}}>
                <button onClick={e=>{e.stopPropagation();onWaterCrop(c.id);}} style={{width:34,height:34,borderRadius:"10px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"1rem"}}>💧</button>
                <button onClick={e=>{e.stopPropagation();onFeedCrop(c);}} style={{width:34,height:34,borderRadius:"10px",background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"1rem"}}>🌿</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ── Todo Panel ─────────────────────────────────────────────────
const URGENCY_STYLES={
  overdue:{bg:"rgba(239,68,68,0.08)",border:"rgba(239,68,68,0.22)",dot:"#ef4444",label:"OVERDUE",labelColor:"#fca5a5"},
  soon:   {bg:"rgba(245,158,11,0.08)",border:"rgba(245,158,11,0.22)",dot:"#f59e0b",label:"SOON",labelColor:"#fbbf24"},
  upcoming:{bg:"rgba(255,255,255,0.04)",border:"rgba(255,255,255,0.08)",dot:"rgba(255,255,255,0.25)",label:"UPCOMING",labelColor:"rgba(232,245,233,0.35)"},
};

function TodoPanel({show,crops,todos,onAddTodo,onEditTodo,onToggleTodo,onDeleteTodo,onLogFeed,onDeleteSchedule,onCropTap,onSuccessionSow,onRemoveSuccession,onSettings,onClose,confirmDeleteSucc,setConfirmDeleteSucc,confirmFeedTodo,setConfirmFeedTodo,confirmDeleteTodo,setConfirmDeleteTodo,confirmDeleteFeedSched,setConfirmDeleteFeedSched}) {
  const [editingTodo,setEditingTodo]=useState(null); // {id, text, due}
  const [confirmDoneTodo,setConfirmDoneTodo]=useState(null);
  const [tab,setTab]=useState("tasks");
  const [addText,setAddText]=useState("");
  const [addDue,setAddDue]=useState("");
  const [showDue,setShowDue]=useState(false);
  const [showDone,setShowDone]=useState(false);
  const confirmDelete=confirmDeleteTodo;const setConfirmDelete=setConfirmDeleteTodo;
  const [dismissedSucc,setDismissedSucc]=useState([]);
  const [feedSelectMode,setFeedSelectMode]=useState(false);
  const [feedSelected,setFeedSelected]=useState({}); // keyed by task id
  const [bulkFeedAction,setBulkFeedAction]=useState(null); // {type:'feed'|'delete', tasks:[]}
  useEffect(()=>{if(tab!=="feedings"){setFeedSelectMode(false);setFeedSelected({});setBulkFeedAction(null);}},[tab]);
  const t0=todayStr();

  function genFeedTasks(){
    const tasks=[];
    const seenSuccession=new Set(); // track name+variety to avoid duplicate succession tasks
    (crops||[]).filter(c=>!c.archived).forEach(c=>{
      const s=c.feedSchedules||{};const fl=c.feedLog||[];
      Object.entries(s).forEach(([nutrient,d])=>{
        const intervalDays=scheduleDays(d);
        if(!intervalDays) return;
        const last=[...fl].reverse().find(f=>f.nutrient===nutrient);
        if(!last){
          tasks.push({id:`feed-${c.id}-${nutrient}`,type:"feed",crop:c,nutrient,qty:d.qty&&d.unit?`${d.qty} ${d.unit}`:null,water:d.water&&d.waterUnit?`${d.water} ${d.waterUnit}`:null,urgency:"overdue",sub:"Never fed - feed now",due:null});
          return;
        }
        const da=daysAgo(last.date);
        const daysLeft=intervalDays-da;
        const dueDate=succDate(last.date.split('T')[0],intervalDays);
        const urgency=da>=intervalDays?"overdue":daysLeft<=3?"soon":"upcoming";
        const sub=da>=intervalDays?`${da-intervalDays}d overdue`:daysLeft<=0?"Due today":`Due in ${daysLeft}d · ${fmtDate(dueDate)}`;
        tasks.push({id:`feed-${c.id}-${nutrient}`,type:"feed",crop:c,nutrient,qty:d.qty&&d.unit?`${d.qty} ${d.unit}`:null,water:d.water&&d.waterUnit?`${d.water} ${d.waterUnit}`:null,urgency,sub,due:dueDate});
      });
      if(c.successionDays){
        const groupKey=`${c.name}::${c.variety}`;
        if(seenSuccession.has(groupKey)) return;
        const sameCrops=(crops||[]).filter(x=>!x.archived&&x.name===c.name&&x.variety===c.variety&&x.successionDays&&Number(x.successionDays)===Number(c.successionDays)&&x.seedDate);
        // Also find any crops with same name+variety (including ones without successionDays) to get latest seed date
        const allSameVariety=(crops||[]).filter(x=>!x.archived&&x.name===c.name&&x.variety===c.variety&&x.seedDate);
        const latestSeedDate=allSameVariety.map(x=>x.seedDate).sort().pop()||c.seedDate;
        const oldestCrop=sameCrops.sort((a,b)=>a.seedDate.localeCompare(b.seedDate))[0]||c;
        const nextSowDate=succDate(latestSeedDate,c.successionDays);
        const diff=daysUntil(nextSowDate);
        if(diff!==null&&(diff<=7||diff<0)){
          seenSuccession.add(groupKey);
          const urgency=diff<0?"overdue":diff===0?"overdue":"soon";
          const sub=diff<0?`${Math.abs(diff)}d overdue - sow now!`:diff===0?"Sow today!":`Sow in ${diff}d`;
          tasks.push({id:`suc-${oldestCrop.id}`,type:"suc",crop:oldestCrop,nutrient:null,urgency,sub,due:nextSowDate,daysOverdue:diff<0?Math.abs(diff):0});
        }
      }
    });
    return tasks.sort((a,b)=>({overdue:0,soon:1,upcoming:2}[a.urgency]||0)-({overdue:0,soon:1,upcoming:2}[b.urgency]||0));
  }

  const allTasks=genFeedTasks();
  const feedTasks=allTasks.filter(t=>t.type==="feed");
  const succTasks=allTasks.filter(t=>t.type==="suc");
  const pending=[...todos].filter(t=>!t.done).sort((a,b)=>{if(a.due&&b.due)return a.due.localeCompare(b.due);if(a.due)return -1;if(b.due)return 1;return 0;});
  const done=todos.filter(t=>t.done);
  const overdueCount=feedTasks.filter(t=>t.urgency==="overdue"||t.urgency==="soon").length;

  const iStyle={background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"11px 14px",fontSize:"16px",color:"white",outline:"none",width:"100%",boxSizing:"border-box"};

  if(!show) return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:150,display:"flex",flexDirection:"column",background:C.bg,fontFamily:F.sans}}>
      {/* Header */}
      <div style={{padding:"max(54px,calc(var(--sat, env(safe-area-inset-top, 50px)) + 16px)) 18px 0",flexShrink:0,background:C.bg}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h1 style={{fontFamily:F.serif,fontSize:"1.85rem",margin:0,color:"white",fontWeight:700,lineHeight:1}}>To-Do</h1>
            <div style={{fontSize:"0.78rem",color:C.dashSub,marginTop:5}}>{pending.length} task{pending.length!==1?"s":""} · {overdueCount} feeding alert{overdueCount!==1?"s":""}</div>
          </div>
          <div style={{position:"relative",flexShrink:0,marginTop:4}}>
            <img src={ICON_SRC} alt="Garden Tracker" style={{width:"44px",height:"44px",borderRadius:"11px",objectFit:"cover",boxShadow:"0 0 0 2px rgba(134,239,172,0.22)",display:"block"}}/>
          </div>
        </div>
        {/* Tab bar */}
        <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          {[{id:"tasks",label:"Tasks",count:pending.length},{id:"feedings",label:"Feedings",count:overdueCount}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 12px",border:"none",background:"transparent",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",color:tab===t.id?"white":"rgba(232,245,233,0.35)",borderBottom:`2px solid ${tab===t.id?C.green:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"color 0.15s"}}>
              {t.label}
              {t.count>0&&<span style={{background:tab===t.id?C.green:"rgba(255,255,255,0.12)",color:tab===t.id?"white":"rgba(232,245,233,0.5)",fontSize:"10px",fontWeight:700,minWidth:"18px",height:"18px",borderRadius:"9px",display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{t.count}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{flex:1,minHeight:0,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingBottom:"calc(68px + env(safe-area-inset-bottom))"}}>

        {/* ── TASKS TAB ── */}
        {tab==="tasks"&&(
          <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
            {/* Add task form */}
            <div style={{background:C.bgCard,borderRadius:"14px",padding:"12px 14px",border:"1px solid rgba(255,255,255,0.07)",display:"flex",flexDirection:"column",gap:8}}>
              <input value={addText} onChange={e=>setAddText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addText.trim()&&(onAddTodo({id:Date.now(),text:addText.trim(),done:false,due:addDue||null}),setAddText(""),setAddDue(""),setShowDue(false))} placeholder="What needs to be done?" style={{background:"none",border:"none",outline:"none",fontSize:"0.92rem",color:"white",width:"100%"}}/>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>setShowDue(v=>!v)} style={{background:showDue?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.06)",border:`1px solid ${showDue?C.green:"rgba(255,255,255,0.1)"}`,borderRadius:"8px",padding:"5px 9px",fontSize:"0.72rem",fontWeight:600,color:showDue?C.green:"rgba(232,245,233,0.4)",cursor:"pointer"}}>📅 Due</button>
                <button onClick={()=>{if(addText.trim()){onAddTodo({id:Date.now(),text:addText.trim(),done:false,due:addDue||null});setAddText("");setAddDue("");setShowDue(false);}}} style={{marginLeft:"auto",background:C.green,border:"none",borderRadius:"8px",padding:"6px 14px",fontSize:"0.82rem",fontWeight:700,color:"white",cursor:"pointer",opacity:addText.trim()?1:0.45}}>Add</button>
              </div>
              {showDue&&(
                <div>
                  <div style={{fontSize:"0.68rem",fontWeight:600,color:"rgba(232,245,233,0.4)",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.08em"}}>Finish By (optional)</div>
                  <input type="date" value={addDue} onChange={e=>setAddDue(e.target.value)} style={{background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"11px 14px",fontSize:"0.92rem",color:"white",outline:"none",width:"100%",colorScheme:"dark"}}/>
                </div>
              )}
            </div>

            {/* Empty */}
            {pending.length===0&&done.length===0&&succTasks.filter(t=>!dismissedSucc.includes(t.id)).length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:"rgba(255,255,255,0.2)",fontStyle:"italic",fontSize:"0.9rem"}}>No tasks yet - you're all caught up 🌿</div>}

            {/* Succession planting reminders */}
            {succTasks.filter(t=>!dismissedSucc.includes(t.id)).map(t=>{
              const acc=cropAccent(t.crop);
              const isOverdue=t.urgency==="overdue";
              return(
                <div key={t.id} style={{background:isOverdue?"rgba(239,68,68,0.07)":"rgba(34,197,94,0.06)",border:`1px solid ${isOverdue?"rgba(239,68,68,0.25)":"rgba(134,239,172,0.2)"}`,borderRadius:"14px",padding:"12px 14px",borderLeft:`3px solid ${isOverdue?"#ef4444":C.green}`}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    <span style={{fontSize:"1.1rem",flexShrink:0,marginTop:1}}>🌱</span>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>onCropTap&&onCropTap(t.crop)}>
                      <div style={{fontSize:"0.72rem",fontWeight:700,color:isOverdue?"#fca5a5":C.green,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>Succession Sowing {isOverdue?"· Overdue":""}</div>
                      <div style={{fontSize:"0.92rem",color:"white",lineHeight:1.4,fontFamily:F.serif,fontStyle:"italic"}}>{t.crop.variety||t.crop.name}</div>
                      <div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.45)",marginTop:1}}>{t.crop.name} · every {t.crop.successionDays}d</div>
                      <div style={{fontSize:"0.78rem",color:isOverdue?"#fca5a5":C.green,marginTop:4,fontWeight:600}}>{t.sub}</div>
                    </div>
                    <button onClick={()=>setConfirmDeleteSucc(t)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.2)",fontSize:"1.2rem",cursor:"pointer",padding:"0 2px",lineHeight:1,flexShrink:0}}>×</button>
                  </div>
                  <div style={{marginTop:10,display:"flex",gap:8}}>
                    <button onClick={()=>onSuccessionSow&&onSuccessionSow(t.crop)} style={{flex:1,background:isOverdue?"#ef4444":C.green,color:"white",border:"none",borderRadius:"10px",padding:"9px 12px",fontSize:"0.82rem",fontWeight:700,cursor:"pointer"}}>
                      🌱 Mark Sown — Start New Crop
                    </button>
                  </div>
                </div>
              );
            })}

            {/* User tasks */}

            {/* Pending tasks */}
            {pending.map(t=>{
              const isOverdue=t.due&&t.due<t0;
              const di=t.due?daysUntil(t.due):null;
              return(
                <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:12,background:isOverdue?"rgba(245,158,11,0.07)":C.bgCard,border:`1px solid ${isOverdue?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:"14px",padding:"12px 14px"}}>
                  <div onClick={()=>setConfirmDoneTodo(t)} style={{width:20,height:20,borderRadius:"6px",flexShrink:0,marginTop:1,border:`1.5px solid ${isOverdue?"#f59e0b":"rgba(255,255,255,0.22)"}`,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}/>
                  <div onClick={()=>setEditingTodo({id:t.id,text:t.text,due:t.due||""})} style={{flex:1,cursor:"pointer"}}>
                    <div style={{fontSize:"0.92rem",color:"white",lineHeight:1.4}}>{t.text}</div>
                    {t.due&&<div style={{fontSize:"0.72rem",color:isOverdue?"#fbbf24":"rgba(232,245,233,0.35)",marginTop:3,fontWeight:isOverdue?600:400}}>{isOverdue?`⚠ Due ${fmtDate(t.due)}`:di===0?"Due today":`Due ${fmtDate(t.due)}`}</div>}
                    {!t.due&&<div style={{fontSize:"0.68rem",color:"rgba(232,245,233,0.2)",marginTop:2}}>Tap to edit or add due date</div>}
                  </div>
                  <button onClick={()=>setConfirmDelete(t)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.2)",fontSize:"1.2rem",cursor:"pointer",padding:"0 2px",lineHeight:1,flexShrink:0}}>×</button>
                </div>
              );
            })}
            {done.length>0&&(
              <div>
                <button onClick={()=>setShowDone(v=>!v)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"0.78rem",fontWeight:700,color:"rgba(232,245,233,0.3)",padding:"4px 0",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{display:"inline-block",transform:showDone?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s"}}>›</span>
                  Completed ({done.length})
                </button>
                {showDone&&done.map(t=>(

        {/* ── Bulk feed confirm ── */}
        {bulkFeedAction&&(
          <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"flex-end"}} onClick={()=>setBulkFeedAction(null)}>
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}}/>
            <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"100%",background:"#1a2b1c",borderRadius:"20px 20px 0 0",padding:`20px 20px max(calc(max(80px, env(safe-area-inset-bottom) + 62px) + 16px), 36px)`,zIndex:1}}>
              <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.2)",margin:"0 auto 16px"}}/>
              <div style={{fontSize:"1.05rem",fontWeight:700,color:"white",marginBottom:6}}>{bulkFeedAction.type==="feed"?`Mark ${bulkFeedAction.tasks.length} as fed?`:`Delete ${bulkFeedAction.tasks.length} schedule${bulkFeedAction.tasks.length!==1?"s":""}?`}</div>
              <div style={{fontSize:"0.85rem",color:"rgba(232,245,233,0.5)",marginBottom:16,lineHeight:1.5}}>{bulkFeedAction.type==="feed"?"A feeding will be logged today for each selected crop using its scheduled amounts.":"The selected recurring feeding schedules will be removed. Past feeding logs are kept."}</div>
              <div style={{maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:18}}>
                {bulkFeedAction.tasks.map(t=>(
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",borderRadius:"9px",padding:"8px 11px"}}>
                    <span style={{fontSize:"0.82rem",color:"rgba(232,245,233,0.85)",flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.crop.variety||t.crop.name}</span>
                    <span style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.4)"}}>{t.nutrient}</span>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setBulkFeedAction(null)} style={{flex:1,padding:"13px",borderRadius:"12px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",fontSize:"0.9rem",fontWeight:600,color:"rgba(232,245,233,0.6)",cursor:"pointer"}}>Cancel</button>
                <button onClick={()=>{
                  if(bulkFeedAction.type==="feed"){
                    bulkFeedAction.tasks.forEach(t=>{
                      const sched=t.crop.feedSchedules?.[t.nutrient];
                      const qty=sched?.qty&&sched?.unit?`${sched.qty} ${sched.unit}`:null;
                      const water=sched?.water&&sched?.waterUnit?`${sched.water} ${sched.waterUnit}`:null;
                      onLogFeed&&onLogFeed(t.crop.id,t.nutrient,qty,water,null);
                    });
                  } else {
                    bulkFeedAction.tasks.forEach(t=>{onDeleteSchedule&&onDeleteSchedule(t.crop.id,t.nutrient);});
                  }
                  setBulkFeedAction(null);setFeedSelected({});setFeedSelectMode(false);
                }} style={{flex:1,padding:"13px",borderRadius:"12px",border:"none",background:bulkFeedAction.type==="feed"?"#f59e0b":"#ef4444",fontSize:"0.9rem",fontWeight:700,color:"white",cursor:"pointer"}}>{bulkFeedAction.type==="feed"?"Log Feeds":"Delete"}</button>
              </div>
            </div>
          </div>
        )}
      </div>

    </div>
  );
}
function WeatherPanel({show,weatherData,location,loading,error,onRefresh,onSettings,onClose,expandedDay,setExpandedDay}) {

  const isNight=today?.sunset?now>new Date(today.sunset):now.getHours()>=20||now.getHours()<6;
  const heroEmoji=isNight?"🌙":today?.info?.emoji||"🌡";
  const heroBg=isNight?"linear-gradient(160deg,#1e1b4b,#312e81,#0e150e)":"linear-gradient(160deg,#0c2340 0%,#0e3a5c 40%,#0e150e 100%)";
  const fmtTime=iso=>{if(!iso)return"-";const d=parseDate(iso);if(!d||isNaN(d))return"-";return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});};
  const fmtForecastDay=(dateStr,i)=>{if(i===0)return"Tomorrow";return new Date(dateStr+"T12:00:00").toLocaleDateString("en-US",{weekday:"long"});};
  const fmtDayShort=dateStr=>new Date(dateStr+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
  const allHighs=forecast.map(d=>d.high);
  const allLows=forecast.map(d=>d.low);
  const maxH=allHighs.length?Math.max(...allHighs):100;
  const minL=allLows.length?Math.min(...allLows):0;
  const tempRange=maxH-minL||1;
  const uvLabel=today?.uvIndex>=8?"Very High":today?.uvIndex>=6?"High":today?.uvIndex>=3?"Moderate":"Low";
  const uvColor=today?.uvIndex>=8?"#ef4444":today?.uvIndex>=6?"#f97316":today?.uvIndex>=3?"#f59e0b":C.green;

  return(
    <div style={{position:"fixed",inset:0,zIndex:150,display:"flex",flexDirection:"column",background:C.bg,fontFamily:F.sans}}>

        </div>

          <img src={ICON_SRC} alt="Garden Tracker" style={{width:"44px",height:"44px",borderRadius:"11px",objectFit:"cover",boxShadow:"0 0 0 2px rgba(134,239,172,0.22)",display:"block"}}/>
        </div>

        {error&&<div style={{margin:"16px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:"12px",padding:"14px",fontSize:"0.85rem",color:"#fca5a5"}}>{error}<div style={{marginTop:"8px"}}><button onClick={onRefresh} style={{background:"#ef4444",color:"white",border:"none",borderRadius:"8px",padding:"6px 14px",fontSize:"0.82rem",fontWeight:600,cursor:"pointer"}}>Retry</button></div></div>}

        {today&&(

            {/* Hero */}

              <div style={{position:"absolute",top:-40,right:-40,width:200,height:200,borderRadius:"50%",background:"rgba(14,165,233,0.12)",pointerEvents:"none"}}/>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(186,230,253,0.6)",marginBottom:16}}>
                {now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
              </div>
              <div style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(186,230,253,0.4)",marginBottom:6}}>Current Conditions</div>
              <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:6}}>
                <div style={{fontSize:"5rem",fontWeight:800,color:"white",lineHeight:1,letterSpacing:"-0.03em"}}>{Math.round(today.currentTemp)}°</div>
                <div style={{paddingTop:10}}>
                  <div style={{fontSize:"2rem",lineHeight:1,marginBottom:4}}>{heroEmoji}</div>

                  {label:"Rain",value:`${today.precipProb||0}%`,sub:"chance",subColor:"#93c5fd"},
                ].map(s=>(
                  <div key={s.label} style={{background:"rgba(255,255,255,0.1)",borderRadius:"10px",padding:"9px 10px",backdropFilter:"blur(4px)"}}>
                    <div style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(186,230,253,0.5)",marginBottom:4}}>{s.label}</div>
                    <div style={{fontSize:"0.95rem",fontWeight:800,color:"white",lineHeight:1}}>{s.value}</div>
                    {s.sub&&<div style={{fontSize:"0.62rem",fontWeight:600,color:s.subColor||"rgba(186,230,253,0.5)",marginTop:3}}>{s.sub}</div>}
                  </div>
                ))}
              </div>
            </div>

            {/* Hourly toggle */}
            {today.hours&&today.hours.length>0&&(
              <div style={{padding:"12px 16px 12px"}}>
                <button onClick={()=>setShowHourly(v=>!v)} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"10px",padding:"8px 14px",color:"rgba(232,245,233,0.55)",fontSize:"0.78rem",fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,width:"100%",justifyContent:"center"}}>
                  <span style={{transform:showHourly?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.2s",display:"inline-block"}}>›</span>
                  {showHourly?"Hide":"Show"} hourly forecast
                </button>
                {showHourly&&(
                  <div style={{marginTop:8,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
                    <div style={{display:"flex",gap:8,paddingBottom:4,minWidth:"max-content"}}>
                      {today.hours.filter(h=>h.hour>=6).map(h=>(
                        <div key={h.hour} style={{background:"rgba(255,255,255,0.06)",borderRadius:"10px",padding:"10px 10px",textAlign:"center",minWidth:"52px",border:"1px solid rgba(255,255,255,0.07)"}}>
                          <div style={{fontSize:"0.62rem",color:"rgba(232,245,233,0.4)",fontWeight:600,marginBottom:4}}>{h.hour===12?"12pm":h.hour<12?`${h.hour}am`:h.hour===0?"12am":`${h.hour-12}pm`}</div>
                          <div style={{fontSize:"0.9rem",marginBottom:2}}>{decodeWMO(h.code).emoji}</div>
                          <div style={{fontSize:"0.82rem",fontWeight:700,color:"white"}}>{Math.round(h.temp)}°</div>
                          <div style={{fontSize:"0.62rem",color:"rgba(186,230,253,0.5)",marginTop:2}}>{h.humidity}%</div>
                          {h.precip>10&&<div style={{fontSize:"0.62rem",color:"#93c5fd",marginTop:1}}>☔{h.precip}%</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* 7-day forecast */}
            <div style={{padding:"0 16px 0"}}>
              {forecast.length>0&&(
                <>
                  <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(134,239,172,0.45)",marginBottom:10}}>7-Day Forecast</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6,paddingBottom:20}}>
                    {forecast.map((day,i)=>{
                      const hasRain=day.precipProb>20||day.precip>0;
                      return(
                        <div key={day.date} onClick={()=>setExpandedDay(i)} style={{display:"flex",alignItems:"center",gap:10,background:hasRain?"rgba(59,130,246,0.07)":C.bgCard,border:`1px solid ${hasRain?"rgba(59,130,246,0.18)":"rgba(255,255,255,0.06)"}`,borderRadius:"14px",padding:"11px 14px",cursor:"pointer"}}>
                          <div style={{fontSize:"1.4rem",flexShrink:0,width:32,textAlign:"center",lineHeight:1}}>{day.info.emoji}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                              <span style={{fontSize:"0.88rem",fontWeight:700,color:"white"}}>{fmtForecastDay(day.date,i)}</span>
                              <span style={{fontSize:"0.65rem",color:"rgba(232,245,233,0.3)"}}>{fmtDayShort(day.date)}</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                              <div style={{fontSize:"0.72rem",color:hasRain?"#93c5fd":"rgba(232,245,233,0.45)"}}>{day.info.label}</div>
                              {hasRain&&<span style={{fontSize:"0.65rem",color:"#60a5fa",fontWeight:700,flexShrink:0}}>☔ {day.precipProb}%</span>}
                            </div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0,marginRight:4}}>
                            <div style={{fontSize:"0.92rem",fontWeight:800,color:"#fb923c"}}>{Math.round(day.high)}°</div>
                            <div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.4)",marginTop:1}}>{Math.round(day.low)}°</div>
                          </div>
                          <span style={{fontSize:"0.75rem",color:"rgba(255,255,255,0.2)",flexShrink:0}}>›</span>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </div>
          </>
        )}

        {!today&&!loading&&!error&&(
          <div style={{textAlign:"center",padding:"3rem 16px",color:"rgba(232,245,233,0.25)"}}>
            <div style={{fontSize:"2rem",marginBottom:12}}>🌡</div>
            <div style={{fontSize:"0.9rem",fontStyle:"italic"}}>Set your ZIP code in Settings to see weather</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Report Panel ───────────────────────────────────────────────
function ReportPanel({show,crops,onRestore,onDeleteCrop,onSettings,onClose,confirmDeleteArchived,setConfirmDeleteArchived,confirmRestore,setConfirmRestore}) {
  const [sec,setSec]=useState("overview");
  const [selYear,setSelYear]=useState(null);
  const [toast,setToast]=useState(null);
  useEffect(()=>{if(!show) setSec("overview");},[show]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),1600);};

  if(!show) return null;

  const active=crops.filter(c=>!c.archived);
  const archived=crops.filter(c=>c.archived);

  // Compute byStage from live data
  const byStage=Object.entries(
    active.reduce((acc,c)=>{acc[c.stage]=(acc[c.stage]||0)+1;return acc;},{})
  ).map(([stage,count])=>({stage,count,dot:(STAGE_COLORS[stage]||STAGE_COLORS.Seed).dot}))
  .sort((a,b)=>b.count-a.count);

  // Harvest by crop
  const harvestByCrop=active.concat(archived).reduce((acc,c)=>{
    if(!(c.harvests||[]).length) return acc;
    const key=`${c.name}::${c.variety}`;
    const acc2=cropAccent(c);
    if(!acc[key]) acc[key]={name:c.name,variety:c.variety,count:0,total:0,unit:"g",accent:acc2};
    (c.harvests||[]).forEach(h=>{if(h.amount){acc[key].count++;acc[key].total+=Number(h.amount);}});
    return acc;
  },{});
  const harvestRows=Object.values(harvestByCrop).sort((a,b)=>b.total-a.total);

  // Feeding summary — all active crops with any feed history or schedule
  const feedingRows=active.filter(c=>Object.keys(c.feedSchedules||{}).length>0||(c.feedLog||[]).length>0).map(c=>{
    const acc=cropAccent(c);
    const schedules=c.feedSchedules||{};
    const fl=c.feedLog||[];
    const hasSchedule=Object.keys(schedules).length>0;
    const overdue=hasSchedule&&Object.entries(schedules).some(([n,d])=>{const l=[...fl].reverse().find(f=>f.nutrient===n);return l&&daysAgo(l.date)>=scheduleDays(d);});
    const lastFeedEntry=[...fl].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const nutrients=[...new Set(fl.map(f=>f.nutrient).filter(Boolean))];
    return{name:c.name,variety:c.variety,feedCount:fl.length,schedCount:Object.keys(schedules).length,hasSchedule,overdue,accent:acc,lastFed:lastFeedEntry?fmtDate(lastFeedEntry.date):null,lastNutrient:lastFeedEntry?.nutrient||"",nutrients,nutrient:Object.keys(schedules)[0]||"",every:scheduleDays(Object.values(schedules)[0])||0};
  }).sort((a,b)=>b.overdue-a.overdue||b.feedCount-a.feedCount);

  // Watering summary
  const wateringRows=active.map(c=>{
    const acc=cropAccent(c);
    const wl=(c.waterLog||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const lastDays=wl.length?daysAgo(wl[0].date):null;
    const manualWl=wl.filter(w=>!w.auto||w.source!=="rain");
    const rainWl=wl.filter(w=>w.auto&&w.source==="rain");
    const recentAll=wl.slice(0,4).map(w=>({date:fmtDate(w.date),isRain:w.auto&&w.source==="rain",amount:w.amount}));
    let avgInterval=null;
    if(manualWl.length>=2){const diffs=manualWl.slice(0,-1).map((_,i)=>Math.abs(daysAgo(manualWl[i].date)-daysAgo(manualWl[i+1].date)));avgInterval=Math.round(diffs.reduce((a,b)=>a+b,0)/diffs.length);}
    return{name:c.name,variety:c.variety,daysAgo:lastDays,waterCount:manualWl.length,rainCount:rainWl.length,avgInterval,accent:acc,recentAll};
  }).filter(c=>c.waterCount>0||c.rainCount>0).sort((a,b)=>(a.daysAgo??999)-(b.daysAgo??999));


  // Location history — group all crops (active + archived) by location and year
  const allCrops=active.concat(archived);
  const locHistory=allCrops.reduce((acc,c)=>{
    const loc=c.location||"Unknown";
    const year=c.seedDate?c.seedDate.slice(0,4):(c.stageHistory?.[0]?.date||"").slice(0,4)||"Unknown";
    if(!acc[loc]) acc[loc]={};
    if(!acc[loc][year]) acc[loc][year]=[];
    acc[loc][year].push(c);
    return acc;
  },{});

  return(
    <div style={{position:"fixed",inset:0,zIndex:150,display:"flex",flexDirection:"column",background:C.bg,fontFamily:F.sans}}>
      {/* Header */}
      <div style={{padding:"max(54px,calc(var(--sat, env(safe-area-inset-top, 50px)) + 16px)) 18px 0",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:sec==="overview"?16:10}}>
          <div>
            <h1 style={{fontFamily:F.serif,fontSize:"1.85rem",margin:0,color:"white",fontWeight:700,lineHeight:1}}>
              {sec==="overview"?"Report":sec==="harvests"?"Harvests":sec==="feeding"?"Feeding":sec==="watering"?"Watering":sec==="locations"?"Locations":"Archived"}
            </h1>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:5}}>
              <div style={{fontSize:"0.78rem",color:C.dashSub}}>{active.length} active · {archived.length} archived</div>
              {sec!=="overview"&&(
                <button onClick={()=>setSec("overview")} style={{background:"rgba(34,197,94,0.12)",border:"1px solid rgba(34,197,94,0.25)",borderRadius:"20px",color:C.green,fontSize:"0.88rem",fontWeight:700,cursor:"pointer",padding:"6px 16px 6px 12px",display:"flex",alignItems:"center",gap:4}}>‹ Report</button>
              )}
            </div>
          </div>
          <div onClick={onSettings} style={{position:"relative",cursor:"pointer",flexShrink:0,marginTop:4}}>
            <img src={ICON_SRC} alt="Garden Tracker" style={{width:"44px",height:"44px",borderRadius:"11px",objectFit:"cover",boxShadow:"0 0 0 2px rgba(134,239,172,0.22)",display:"block"}}/>
            <div style={{position:"absolute",bottom:"-3px",right:"-3px",width:"17px",height:"17px",borderRadius:"9px",background:C.bgCard,border:"1.5px solid rgba(255,255,255,0.12)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <svg width="10" height="10" viewBox="0 0 11 11" fill="none"><path d="M5.5 7a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" stroke="rgba(232,245,233,0.6)" strokeWidth="1.1"/><path d="M5.5 1v1M5.5 9v1M1 5.5h1M9 5.5h1M2.1 2.1l.7.7M8.2 8.2l.7.7M8.2 2.8l-.7.7M2.8 8.2l-.7.7" stroke="rgba(232,245,233,0.6)" strokeWidth="1.1" strokeLinecap="round"/></svg>
            </div>
          </div>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{flex:1,minHeight:0,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px 16px 0",paddingBottom:"calc(68px + env(safe-area-inset-bottom))"}}>

        {/* ── OVERVIEW HUB ── */}
        {sec==="overview"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12,paddingBottom:20}}>
            {/* Stats row */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={{background:C.bgCard,borderRadius:"16px",padding:"18px 14px",textAlign:"center",border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:"2.8rem",fontWeight:800,color:C.green,lineHeight:1}}>{active.length}</div>
                <div style={{fontSize:"0.68rem",fontWeight:700,color:"rgba(232,245,233,0.4)",marginTop:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>Active Crops</div>
              </div>
              <div style={{background:C.bgCard,borderRadius:"16px",padding:"18px 14px",textAlign:"center",border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:"2.8rem",fontWeight:800,color:"rgba(232,245,233,0.4)",lineHeight:1}}>{archived.length}</div>
                <div style={{fontSize:"0.68rem",fontWeight:700,color:"rgba(232,245,233,0.3)",marginTop:6,letterSpacing:"0.08em",textTransform:"uppercase"}}>Archived</div>
              </div>
            </div>

            {/* Crops by stage */}
            {byStage.length>0&&(
              <div style={{background:C.bgCard,borderRadius:"16px",padding:"16px",border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(134,239,172,0.45)",marginBottom:12}}>Crops by Stage</div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {byStage.map(s=>{
                    const pct=Math.round((s.count/Math.max(active.length,1))*100);
                    return(
                      <div key={s.stage}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                          <div style={{display:"flex",alignItems:"center",gap:7}}>
                            <div style={{width:8,height:8,borderRadius:"4px",background:s.dot,flexShrink:0}}/>
                            <span style={{fontSize:"0.85rem",fontWeight:600,color:"rgba(232,245,233,0.85)"}}>{s.stage}</span>
                          </div>
                          <span style={{fontSize:"0.82rem",fontWeight:700,color:"rgba(232,245,233,0.5)"}}>{s.count}</span>
                        </div>
                        <div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:"3px",overflow:"hidden"}}>
                          <div style={{width:`${pct}%`,height:"100%",background:s.dot,borderRadius:"3px",opacity:0.85}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Hub cards */}
            {[
              {
                id:"harvests",icon:"🌾",label:"Harvests",
                preview:harvestRows.length>0?`${harvestRows.length} crop${harvestRows.length!==1?"s":""} with harvest data`:"No harvests logged yet",
                sub:harvestRows.length>0?harvestRows.slice(0,2).map(h=>h.variety).join(", "):null,
                dim:harvestRows.length===0,
              },
              {
                id:"feeding",icon:"🌿",label:"Feeding",
                preview:feedingRows.length>0?`${feedingRows.length} crop${feedingRows.length!==1?"s":""} with feeding history`:null,
                sub:feedingRows.length>0?feedingRows.slice(0,2).map(f=>f.variety).join(", "):"No feedings logged yet",
                dim:feedingRows.length===0,
              },
              {
                id:"watering",icon:"💧",label:"Watering",
                preview:(()=>{const recent=active.filter(c=>(c.waterLog||[]).length>0).length;return recent>0?`${recent} crop${recent!==1?"s":""} with watering logs`:"No watering logs yet";})(),
                sub:(()=>{const w=active.filter(c=>(c.waterLog||[]).length>0).sort((a,b)=>new Date(b.waterLog.slice(-1)[0]?.date)-new Date(a.waterLog.slice(-1)[0]?.date));return w.length>0?"Last: "+(w[0].variety||w[0].name):null;})(),
                dim:active.filter(c=>(c.waterLog||[]).length>0).length===0,
              },
              {
                id:"locations",icon:"📍",label:"Locations",
                preview:`${Object.keys(locHistory).length} location${Object.keys(locHistory).length!==1?"s":""}`,
                sub:Object.keys(locHistory).slice(0,3).join(", "),
                dim:Object.keys(locHistory).length===0,
              },
              {
                id:"archived",icon:"📦",label:"Archived",
                preview:archived.length>0?`${archived.length} past crop${archived.length!==1?"s":""}`:null,
                sub:archived.length>0?archived.slice(0,2).map(c=>c.variety||c.name).join(", "):"Nothing archived yet",
                dim:archived.length===0,
              },
            ].map(card=>(
              <div key={card.id} onClick={()=>!card.dim&&setSec(card.id)} style={{background:C.bgCard,borderRadius:"16px",padding:"16px 18px",border:"1px solid rgba(255,255,255,0.06)",cursor:card.dim?"default":"pointer",opacity:card.dim?0.5:1,display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:"1.8rem",flexShrink:0}}>{card.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.95rem",fontWeight:700,color:"white",marginBottom:3}}>{card.label}</div>
                  <div style={{fontSize:"0.78rem",color:"rgba(232,245,233,0.5)"}}>{card.preview}</div>
                  {card.sub&&<div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.3)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{card.sub}</div>}
                </div>
                {!card.dim&&<div style={{fontSize:"1.2rem",color:"rgba(255,255,255,0.2)",flexShrink:0}}>›</div>}
              </div>
            ))}
          </div>
        )}
        {/* ── ARCHIVED ── */}
        {sec==="archived"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:20}}>
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(134,239,172,0.45)",marginBottom:4}}>Archived Crops ({archived.length})</div>
            {archived.length===0&&<div style={{textAlign:"center",padding:"2rem",color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No archived crops.</div>}
            {[...archived].sort((a,b)=>{
              const aDate=a.stageHistory?.[a.stageHistory.length-1]?.date||a.seedDate||"";
              const bDate=b.stageHistory?.[b.stageHistory.length-1]?.date||b.seedDate||"";
              return bDate.localeCompare(aDate);
            }).map(c=>{
              const acc=cropAccent(c);
              const isLost=c.stage==="Lost";
              const lastStageDate=c.stageHistory?.[c.stageHistory.length-1]?.date;
              const ht=(()=>{const w=(c.harvests||[]).filter(h=>h.amount&&h.unit);if(!w.length)return null;const t={};w.forEach(h=>{t[h.unit]=(t[h.unit]||0)+Number(h.amount);});const top=Object.entries(t).sort((a,b)=>b[1]-a[1])[0];return`${Math.round(top[1]*100)/100} ${top[0]}`;})();
              return(
                <div key={c.id} style={{background:C.bgCard,borderRadius:"14px",padding:"14px",border:`1px solid ${isLost?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.06)"}`,borderLeft:`3px solid ${acc.from}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.1em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase"}}>{c.name}</div>
                      <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"1rem",color:"rgba(255,255,255,0.9)",lineHeight:1.2}}>{c.variety||c.name}</div>
                    </div>
                    <span style={{background:isLost?"rgba(239,68,68,0.15)":"rgba(255,255,255,0.08)",color:isLost?"#fca5a5":"rgba(232,245,233,0.55)",fontSize:"0.68rem",fontWeight:700,padding:"3px 9px",borderRadius:"20px",flexShrink:0,marginLeft:8}}>
                      {isLost?"🪦 Lost":"✅ Done"}
                    </span>
                  </div>
                  <div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.35)",marginBottom:10}}>
                    📍 {c.location}{ht?` · 🌾 ${ht}`:""}
                    {lastStageDate&&<span> · {fmtDate(lastStageDate)}</span>}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setConfirmRestore(c)} style={{flex:1,padding:"9px",borderRadius:"10px",border:`1px solid ${C.green}`,background:"rgba(34,197,94,0.1)",fontSize:"0.82rem",fontWeight:700,color:C.green,cursor:"pointer"}}>↺ Restore</button>
                    <button onClick={()=>setConfirmDeleteArchived(c)} style={{flex:1,padding:"9px",borderRadius:"10px",border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.08)",fontSize:"0.82rem",fontWeight:700,color:"#fca5a5",cursor:"pointer"}}>Delete</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── HARVESTS ── */}
        {sec==="harvests"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:20}}>
            {harvestRows.length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:"rgba(232,245,233,0.2)",fontStyle:"italic"}}>No harvests logged yet.</div>}
            {crops.flatMap(c=>(c.harvests||[]).map(h=>({...h,cropName:c.name,variety:c.variety,acc:cropAccent(c)}))).sort((a,b)=>new Date(b.date)-new Date(a.date)).map((h,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,background:C.bgCard,borderRadius:"14px",padding:"12px 14px",border:"1px solid rgba(255,255,255,0.06)",borderLeft:`3px solid ${h.acc.from}`}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.58rem",fontWeight:700,letterSpacing:"0.1em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase"}}>{h.cropName}</div>
                  <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"0.9rem",color:"rgba(255,255,255,0.88)",lineHeight:1.2}}>{h.variety}</div>
                  {h.note&&<div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.4)",marginTop:3,fontStyle:"italic"}}>{h.note}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:"0.92rem",fontWeight:800,color:C.green}}>{h.amount&&`${h.amount} ${h.unit}`}</div>

                              </div>

// ── Password Reset Screen ──────────────────────────────────────
function PasswordResetScreen({onDone}) {
  const [password,setPassword]=useState("");
  const [confirm,setConfirm]=useState("");
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [error,setError]=useState("");
  const noMatch=confirm&&password!==confirm;
  const match=password&&confirm&&password===confirm;
  const wi={width:"100%",padding:"14px 16px",borderRadius:"12px",border:`1.5px solid ${noMatch?"rgba(239,68,68,0.5)":"rgba(255,255,255,0.15)"}`,background:"rgba(255,255,255,0.08)",color:"white",fontSize:"1rem",outline:"none",boxSizing:"border-box"};
  async function handleSubmit(){
    if(!match) return;
    setLoading(true);setError("");
    const {error:e}=await sb.auth.updateUser({password});
    setLoading(false);
    if(e){setError(e.message);return;}
    setDone(true);
  }
  if(done) return(
    <div style={{width:"100%",height:"100%",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 28px",textAlign:"center",gap:16}}>
      <div style={{fontSize:"3rem"}}>✅</div>
      <div style={{fontFamily:F.serif,fontSize:"1.5rem",color:"white",fontWeight:700}}>Password updated!</div>
      <div style={{fontSize:"0.9rem",color:"rgba(255,255,255,0.45)"}}>You can now sign in with your new password.</div>
      <button onClick={onDone} style={{background:C.green,color:"white",border:"none",borderRadius:"14px",padding:"16px 32px",fontSize:"1rem",fontWeight:700,cursor:"pointer",marginTop:8}}>Go to Sign In</button>
    </div>
  );
  return(
    <div style={{width:"100%",height:"100%",background:C.bg,overflowY:"auto"}}>
      <div style={{minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 28px"}}>
        <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:16}}>
          <div style={{textAlign:"center",marginBottom:4}}>
            <img src={LOGO_SRC} alt="Garden Tracker" style={{width:140,height:140,objectFit:"contain",display:"block",margin:"0 auto 12px",mixBlendMode:"screen"}}/>
            <div style={{fontFamily:F.serif,fontSize:"1.4rem",color:"white",fontWeight:700}}>Set a new password</div>
            <div style={{fontSize:"0.85rem",color:"rgba(255,255,255,0.4)",marginTop:6}}>Choose something strong and memorable.</div>
          </div>
          {error&&<div style={{background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.35)",borderRadius:"10px",padding:"12px 14px",fontSize:"0.85rem",color:"#fca5a5"}}>{error}</div>}
          <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="New password" type="password" style={wi}/>
          <div>
            <input value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Confirm password" type="password" style={wi}/>
            {noMatch&&<div style={{fontSize:"0.75rem",color:"#fca5a5",marginTop:5}}>Passwords don't match</div>}
          </div>
          <button onClick={handleSubmit} disabled={loading||!match} style={{background:C.green,color:"white",border:"none",borderRadius:"14px",padding:"16px",fontSize:"1rem",fontWeight:700,cursor:"pointer",opacity:(loading||!match)?0.4:1}}>
            {loading?"Updating...":"Update Password"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  // ── Auth state ──────────────────────────────────────────────
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [isPasswordReset,setIsPasswordReset]=useState(false);

  // Check for existing session on mount - also handles email confirmation redirect
  useEffect(()=>{
    // Detect password reset flow (type=recovery in URL hash)
    if(window.location.hash&&window.location.hash.includes("type=recovery")){
      setIsPasswordReset(true);
      setAuthLoading(false);
      return;
    }
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
      setAuthLoading(false);
      if(window.location.hash&&window.location.hash.includes("access_token")){
        window.history.replaceState(null,"",window.location.pathname);
      }
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      setUser(session?.user||null);
      if(event==="SIGNED_IN") setAuthLoading(false);
      if(event==="PASSWORD_RECOVERY") setIsPasswordReset(true);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── Garden state - always start empty, filled by Supabase load ─
  const [dbLoaded,setDbLoaded]=useState(false);
  const [gardenId,setGardenId]=useState(null);
  const [settings,setSettings]   = useState(null);
  const [locations,setLocations] = useState([]);
  const [locationMeta,setLocationMeta] = useState({});
  const [crops,setCrops]         = useState([]);
  const cropsRef = useRef([]);
  useEffect(()=>{ cropsRef.current=crops; },[crops]);
  const [todos,setTodos]         = useState([]);
  const [nutrients,setNutrients] = useState(DEFAULT_NUTRIENTS);
  const [cropNames,setCropNames] = useState(DEFAULT_CROPS);
  const [varieties,setVarieties] = useState({});
  const [containerSizes,setContainerSizes] = useState([]);

  // Load from Supabase when user logs in
  useEffect(()=>{
    if(!user){
      setDbLoaded(false);setGardenId(null);setSettings(null);
      setLocations([]);setLocationMeta({});setTodos([]);
      setNutrients(DEFAULT_NUTRIENTS);setCropNames(DEFAULT_CROPS);
      setVarieties({});
      return;
    }
    setDbLoaded(false);
    dbLoad(user.id).then(row=>{
      if(row){
        if(row._gardenId)      {setGardenId(row._gardenId);console.log('gardenId set to:',row._gardenId);}
        if(row.settings)       setSettings(row.settings);
        if(row.locations)      setLocations(row.locations);
        if(row.location_meta)  setLocationMeta(row.location_meta);
        if(row.crops)          setCrops(row.crops);
        if(row.todos)          setTodos(row.todos);
        if(row.nutrients)      setNutrients(row.nutrients);
        if(row.crop_names)     setCropNames(row.crop_names);
        if(row.varieties)      setVarieties(row.varieties);
        if(row.container_sizes)setContainerSizes(row.container_sizes);
      }
      setDbLoaded(true);
    });
  },[user?.id]);

  // No auto-save timer in v2 — every mutation writes directly to Supabase

  const syncing = false; // v2 uses direct writes — no sync state needed

  // ── Weather ─────────────────────────────────────────────────
  const [weatherData,setWeatherData]=useState(null);
  const [weatherLocation,setWeatherLocation]=useState(null);
  const [weatherLoading,setWeatherLoading]=useState(false);
  const [weatherError,setWeatherError]=useState("");
  const [weatherRec,setWeatherRec]=useState(null); // {icon, text} from Claude API
  const [weatherRecLoading,setWeatherRecLoading]=useState(false);

  // ── Historical rain sync ─────────────────────────────────────
  const rainSyncRef = useRef({running:false,lastFetch:0});
  const syncRainData=async(lat,lon,locMeta,cropList)=>{
    if(!lat||!lon) return;
    const today=todayStr();
    // Prevent concurrent/overlapping syncs (which could write duplicate rows)
    if(rainSyncRef.current.running) return;
    // Throttle: the effect re-fires whenever locationMeta changes (which a sync
    // itself causes by stamping lastRainSync). Skip if we just fetched, to avoid
    // a re-fetch loop now that the old "already synced today" guard is gone.
    const MIN_FETCH_GAP_MS=5*60*1000; // 5 min
    if(Date.now()-rainSyncRef.current.lastFetch<MIN_FETCH_GAP_MS) return;
    rainSyncRef.current.running=true;
    try {
      await runRainSync(lat,lon,locMeta,cropList,today);
    } finally {
      rainSyncRef.current.running=false;
    }
  };
  const runRainSync=async(lat,lon,locMeta,cropList,today)=>{
    // Always read the freshest crops for dedup (the passed-in list can be a
    // stale closure when this effect re-fires on locationMeta changes).
    const cropData=cropsRef.current.length?cropsRef.current:(cropList||crops);

    const outdoorLocs=(locMeta?Object.keys(locMeta):locations).filter(loc=>locMeta?locMeta[loc]?.outdoor===true:locationMeta[loc]?.outdoor===true);
    if(!outdoorLocs.length) return;

    const outdoorCrops=cropData.filter(c=>!c.archived&&outdoorLocs.includes(c.location)&&c.seedDate);
    // For indoor-started crops, rain only counts from transplant date onwards
    const cropOutdoorStart=c=>c.startType==="indoor"&&c.transplantDate?c.transplantDate:c.seedDate;
    const earliestCropDate=outdoorCrops.map(c=>cropOutdoorStart(c)).filter(Boolean).sort()[0];
    const meta=locMeta||locationMeta;
    const earliestSync=outdoorLocs.reduce((min,loc)=>{
      const last=meta[loc]?.lastRainSync;
      if(!last) return min;
      return last<min?last:min;
    },today);

    // How many trailing days to re-check for revised (provisional->final) amounts.
    // Open-Meteo's forecast values for recent days settle within ~a week; today's
    // value in particular is provisional and updates as more rain falls.
    const REVISE_WINDOW_DAYS=10;

    const rawStart=outdoorLocs.some(loc=>!meta[loc]?.lastRainSync)
      ?earliestCropDate
      :earliestSync;
    if(!rawStart) return;
    // Always extend the fetch window back over the revision window so recently
    // logged (still-provisional) days get re-examined, not just brand-new dates.
    const reviseStartD=parseDate(today); reviseStartD.setDate(reviseStartD.getDate()-REVISE_WINDOW_DAYS);
    const reviseStartStr=`${reviseStartD.getFullYear()}-${String(reviseStartD.getMonth()+1).padStart(2,'0')}-${String(reviseStartD.getDate()).padStart(2,'0')}`;
    // Don't start before the crop/garden actually existed.
    const earliestAllowed=earliestCropDate||rawStart;
    let startDate=rawStart<reviseStartStr?rawStart:reviseStartStr;
    if(startDate<earliestAllowed) startDate=earliestAllowed;

    try{
      // Use forecast API with past_days - more reliable than archive API which lags 5-7 days
      const pastDays=Math.min(92,Math.ceil((new Date()-new Date(startDate+"T00:00:00"))/86400000));
      if(pastDays<=0) return;
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=precipitation_sum&past_days=${pastDays}&forecast_days=1&timezone=auto&precipitation_unit=inch`;
      rainSyncRef.current.lastFetch=Date.now();
      const res=await fetch(url);
      if(!res.ok) return;
      const raw=await res.json();
      if(!raw?.daily?.time) return;

      const rainByDate={};
      raw.daily.time.forEach((date,i)=>{
        const amount=raw.daily.precipitation_sum[i];
        if(amount&&amount>0.01) rainByDate[date]=Math.round(amount*100)/100;
      });

      if(!Object.keys(rainByDate).length){
        // No rain in range — just update sync dates (local + DB)
        setLocationMeta(prev=>{
          const updated={...prev};
          outdoorLocs.forEach(loc=>{updated[loc]={...updated[loc],lastRainSync:today};});
          return updated;
        });
        if(gardenId) db2.setLocationRainSync(gardenId,outdoorLocs,today);
        return;
      }

      // Add new rain entries, and revise recent ones whose amount changed.
      const cutoffDate=parseDate(todayStr()); cutoffDate.setDate(cutoffDate.getDate()-REVISE_WINDOW_DAYS);
      const withinReviseWindow=dateStr=>{const d=parseDate(dateStr); return d&&d>=cutoffDate;};
      const additions={}; // cropId -> [entries with _id]   (new inserts)
      const revisions={}; // cropId -> [{_id,date,amount,note}]  (amount updates)
      for(const c of cropData) {
        if(!outdoorLocs.includes(c.location)||c.archived) continue;
        const rainRows=(c.waterLog||[]).filter(w=>w.auto&&w.source==="rain");
        const byDate={}; rainRows.forEach(w=>{const k=w.date?.slice(0,10); if(k) byDate[k]=w;});
        const outdoorStart=c.startType==="indoor"&&c.transplantDate?c.transplantDate:c.seedDate;
        const newEntries=[];
        const revEntries=[];
        for(const [date,amount] of Object.entries(rainByDate)){
          if(date<outdoorStart) continue;
          const existing=byDate[date];
          if(!existing){
            newEntries.push({date:`${date}T12:00:00`,amount,unit:"in",auto:true,source:"rain",note:`🌧 ${amount}" rainfall`});
          } else if(withinReviseWindow(date) && existing._id && Math.abs((existing.amount||0)-amount)>0.001){
            revEntries.push({_id:existing._id,date:existing.date,amount,note:`🌧 ${amount}" rainfall`});
          }
        }
        if(newEntries.length){
          const written=[];
          for(const e of newEntries){
            const row=await db2.addWater(c.id,e.date,'rain',e.amount,'in',e.note);
            written.push({...e,_id:row?.id});
          }
          additions[c.id]=written;
        }
        if(revEntries.length){
          for(const r of revEntries){
            await db2.updateWater(r._id,{amount:r.amount,note:r.note});
          }
          revisions[c.id]=revEntries;
        }
      }

      // Merge inserts + revisions into current state via functional updater.
      if(Object.keys(additions).length||Object.keys(revisions).length){
        const mergeRain=c=>{
          const add=additions[c.id];
          const rev=revisions[c.id];
          if(!add&&!rev) return c;
          let wl=c.waterLog||[];
          if(rev){
            const revById={}; rev.forEach(r=>{revById[r._id]=r;});
            wl=wl.map(w=>w._id&&revById[w._id]?{...w,amount:revById[w._id].amount,note:revById[w._id].note}:w);
          }
          if(add){
            const have=new Set(wl.filter(w=>w.auto&&w.source==="rain").map(w=>w.date?.slice(0,10)));
            const fresh=add.filter(e=>!have.has(e.date.slice(0,10)));
            if(fresh.length) wl=[...wl,...fresh];
          }
          const combined=[...wl].sort((a,b)=>parseDate(a.date)-parseDate(b.date));
          return {...c,waterLog:combined};
        };
        setCrops(prev=>prev.map(mergeRain));
        setSelCrop(p=>p?mergeRain(p):p);
      }

      // Update lastRainSync for all outdoor locations (local + DB)
      setLocationMeta(prev=>{

        outdoorLocs.forEach(loc=>{updated[loc]={...updated[loc],lastRainSync:today};});

      if(!raw){setWeatherError("Weather data unavailable - check connection");setWeatherLoading(false);return;}
      // Rain sync triggered separately via useEffect with fresh state
      const hourlyVal=(field,dayIdx,hour)=>{
        const idx=(raw.hourly?.time||[]).findIndex(t=>t===`${raw.daily.time[dayIdx]}T${String(hour).padStart(2,'0')}:00`);
        return idx>=0?raw.hourly[field]?.[idx]:null;
      };
      const dayHours=(dayIdx)=>{
        const prefix=raw.daily.time[dayIdx];
        return (raw.hourly?.time||[]).reduce((acc,t,i)=>{
          if(t.startsWith(prefix)){
            const hour=parseInt(t.slice(11,13));
            acc.push({hour,temp:raw.hourly.temperature_2m?.[i],code:raw.hourly.weather_code?.[i],precip:raw.hourly.precipitation_probability?.[i],humidity:raw.hourly.relative_humidity_2m?.[i]});
          }

      };
      const dayPeriods=(dayIdx)=>({
        morning:{temp:hourlyVal('temperature_2m',dayIdx,7),code:hourlyVal('weather_code',dayIdx,7),precip:hourlyVal('precipitation_probability',dayIdx,7)},
        midday:{temp:hourlyVal('temperature_2m',dayIdx,13),code:hourlyVal('weather_code',dayIdx,13),precip:hourlyVal('precipitation_probability',dayIdx,13)},
        night:{temp:hourlyVal('temperature_2m',dayIdx,20),code:hourlyVal('weather_code',dayIdx,20),precip:hourlyVal('precipitation_probability',dayIdx,20)},
      });
      const makeSummary=(dayIdx,info)=>{
        const prefix=raw.daily.time[dayIdx];
        const hours=(raw.hourly?.time||[]).reduce((acc,t,i)=>{
          if(t.startsWith(prefix)){
            acc.push({hour:parseInt(t.slice(11,13)),temp:raw.hourly.temperature_2m?.[i],code:raw.hourly.weather_code?.[i],precip:raw.hourly.precipitation_probability?.[i]});
          }
          return acc;
        },[]);
        if(!hours.length) return info.label+".";

        const get=(h)=>hours.find(x=>x.hour===h)||null;
        const morning=get(7)||get(8)||get(9);
        const midday=get(12)||get(13);
        const afternoon=get(15)||get(16);
        const evening=get(19)||get(20);

        const desc=(h)=>h?decodeWMO(h.code).label:"";
        const temp=(h)=>h?.temp!=null?`${Math.round(h.temp)}°`:"";
        const rainHours=hours.filter(h=>h.hour>=6&&h.hour<=22&&h.precip>50);
        const maxPrecip=Math.max(...hours.filter(h=>h.hour>=6&&h.hour<=22).map(h=>h.precip||0));
        const maxTemp=Math.max(...hours.filter(h=>h.hour>=10&&h.hour<=18).map(h=>h.temp||0));
        const minTemp=Math.min(...hours.filter(h=>h.hour>=0&&h.hour<=6).map(h=>h.temp||Infinity));

        const parts=[];

        // Morning description
        if(morning) parts.push(`${desc(morning)} morning (${temp(morning)})`);

        // Midday/afternoon
        if(midday){
          if(desc(midday)!==desc(morning)) parts.push(`${desc(midday).toLowerCase()} by midday (${temp(midday)})`);
          else parts.push(`continuing into the afternoon (${temp(afternoon||midday)})`);
        }

        // Evening
        if(evening&&desc(evening)!==desc(midday||morning)) parts.push(`${desc(evening).toLowerCase()} by evening (${temp(evening)})`);

        // Rain warning
        if(rainHours.length>=3) parts.push(`rain likely for much of the day`);
        else if(rainHours.length>0){
          const start=rainHours[0].hour;
          const label=start<12?`morning`:start<17?`afternoon`:`evening`;
          parts.push(`rain possible in the ${label}`);
        }

        return parts.join(", ")+".";
      };
