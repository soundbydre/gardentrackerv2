                      <div key={nutrient} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",background:isOverdue?"rgba(245,158,11,0.08)":"rgba(255,255,255,0.04)",borderRadius:"10px",border:`1px solid ${isOverdue?"rgba(245,158,11,0.3)":"rgba(255,255,255,0.06)"}`}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:"0.85rem",fontWeight:600,color:"rgba(232,245,233,0.88)"}}>{nutrient}</div>
                          <div style={{fontSize:"0.72rem",color:isOverdue?"#fbbf24":"rgba(232,245,233,0.35)",marginTop:2}}>
                            {isOverdue?`⚠ Overdue by ${da-intervalDays}d`:daysLeft!==null?`Next in ${daysLeft}d${nextDate?` · ${fmtDate(nextDate)}`:""}`:nextDate?`Every ${intervalDays}d`:`Every ${intervalDays}d · not yet fed`}
                          </div>
                        </div>
                        <span style={{fontSize:"0.68rem",color:"rgba(232,245,233,0.3)",background:"rgba(255,255,255,0.06)",padding:"2px 7px",borderRadius:"6px",flexShrink:0}}>every {intervalDays}d</span>
                        <button onClick={()=>{setEditingSchedKey(nutrient);setEditSchedData({nutrient,days:String(intervalDays),qty:sched?.qty||"",unit:sched?.unit||"tbsp",water:sched?.water||"",waterUnit:sched?.waterUnit||"gal"});}} aria-label="Edit schedule" style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",color:"rgba(232,245,233,0.6)",cursor:"pointer",padding:0,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M14.5 3.5l2 2L7 15l-3 1 1-3 9.5-9.5z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/></svg>
                        </button>
                        <button onClick={()=>setConfirmDeleteSched(nutrient)} aria-label="Delete schedule" style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:"8px",color:"#ef4444",cursor:"pointer",padding:0,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M4 6h12M8 6V4h4v2M6 6l1 10h6l1-10" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Log Harvest */}
            {crop.stage!=="Done"&&crop.stage!=="Lost"&&(
              <button onClick={()=>setShowHarvest(true)} style={{display:"flex",alignItems:"center",gap:12,background:C.bgCard,borderRadius:"14px",padding:"13px 16px",border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer",textAlign:"left",width:"100%"}}>
                <span style={{fontSize:"1.3rem"}}>🌾</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.88rem",fontWeight:600,color:"rgba(232,245,233,0.85)"}}>Log a Harvest</div>
                  <div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.35)",marginTop:1}}>{totalHarvest?`${totalHarvest} total logged`:"No harvests logged yet"}</div>
                </div>
                <span style={{color:"rgba(232,245,233,0.2)"}}>›</span>
              </button>
            )}

            {/* Succession */}
            {nextSow&&(
              <div style={{background:sowDiff!==null&&sowDiff<=3?"rgba(34,197,94,0.08)":C.bgCard,borderRadius:"14px",padding:"13px 16px",border:`1.5px solid ${sowDiff!==null&&sowDiff<=3?"rgba(134,239,172,0.3)":"rgba(255,255,255,0.07)"}`}}>
                <div style={{fontSize:"0.62rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",color:"rgba(134,239,172,0.5)",marginBottom:5}}>🌱 Succession</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:"0.9rem",fontWeight:600,color:"rgba(232,245,233,0.85)"}}>Next sow: {fmtDate(nextSow)}</div>
                  {sowDiff!==null&&<span style={{fontSize:"0.8rem",fontWeight:700,color:sowDiff<=0?C.green:sowDiff<=3?"#86efac":"rgba(232,245,233,0.4)"}}>{sowDiff<=0?"Sow now! 🟢":`in ${sowDiff}d`}</span>}
                </div>
              </div>
            )}

            {/* Action rows */}
            {[
              {icon:"📦",label:"Transplant / Move Location",sub:`Currently in ${crop.location}${crop.containerSize?` · ${crop.containerSize}`:""}`,fn:()=>setShowTransplant(true)},
              {icon:"✏️",label:"Edit Crop Details",sub:null,fn:()=>onEdit()},
            ].map((item,i)=>(
              <button key={i} onClick={item.fn} style={{display:"flex",alignItems:"center",gap:12,background:C.bgCard,borderRadius:"14px",padding:"13px 16px",border:"1px solid rgba(255,255,255,0.07)",cursor:"pointer",width:"100%",textAlign:"left"}}>
                <span style={{fontSize:"1.2rem"}}>{item.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.88rem",fontWeight:600,color:"rgba(232,245,233,0.85)"}}>{item.label}</div>
                  {item.sub&&<div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.35)",marginTop:1}}>{item.sub}</div>}
                </div>
                <span style={{color:"rgba(232,245,233,0.2)"}}>›</span>
              </button>
            ))}

            {/* Mark Done / Lost / Delete */}
            <div style={{display:"flex",gap:0,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:8}}>
              {[
                {label:"Mark Done",fn:()=>setConfirmDone(true),color:"rgba(232,245,233,0.35)"},
                {label:"Mark Lost",fn:()=>setConfirmLost(true),color:"#fca5a5"},
                {label:"Delete",fn:()=>setConfirmDelete(true),color:"#ef4444"},
              ].map((a,i)=>(
                <button key={i} onClick={a.fn} style={{flex:1,padding:"10px 4px",background:"none",border:"none",fontSize:"0.78rem",fontWeight:500,color:a.color,cursor:"pointer",textDecoration:"underline"}}>{a.label}</button>
              ))}
            </div>
          </div>
        )}

        {/* ── LOG ── */}
        {tab==="log"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* Add note */}
            <div style={{display:"flex",gap:8}}>
              <input value={noteText} onChange={e=>setNoteText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&noteText.trim()){onAddNote(crop.id,noteText.trim());setNoteText("");}}} placeholder="Add a note..." style={{...iS,flex:1}}/>
              <button onClick={()=>{if(noteText.trim()){onAddNote(crop.id,noteText.trim());setNoteText("");}}} style={{background:"#8b5cf6",color:"white",border:"none",borderRadius:"10px",padding:"11px 16px",fontSize:"0.88rem",fontWeight:700,cursor:"pointer"}}>Add</button>
            </div>
            {logEntries.length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:"rgba(232,245,233,0.2)",fontStyle:"italic"}}>Nothing logged yet.</div>}
            {logEntries.map((entry,i)=>{
              const isFeed=entry.type==="feed";const isWater=entry.type==="water";const isRain=isWater&&entry.data?.source==="rain";const isAuto=entry.type==="auto";const isNote=entry.type==="note";const isHarvest=entry.type==="harvest";const isLifecycle=entry.type==="lifecycle";
              const borderColor=isFeed?"#f59e0b":isRain?"#60a5fa":isWater?"#3b82f6":isAuto?C.green:isHarvest?"#a78bfa":isLifecycle?"rgba(255,255,255,0.2)":"#8b5cf6";
              const typeLabel=isFeed?"Feed":isRain?"Rainfall":isWater?"Water":isAuto?"Auto":isHarvest?"Harvest":isLifecycle?"Lifecycle":"Note";
              const typeLabelColor=isFeed?"#fbbf24":isRain?"#93c5fd":isWater?"#60a5fa":isAuto?C.green:isHarvest?"#c4b5fd":isLifecycle?"rgba(232,245,233,0.5)":"#a78bfa";
              const isEditingNote=isNote&&editingNoteIdx===entry.idx;
              const isEditingFeed=isFeed&&editingFeedIdx===entry.idx;
              return(
                <div key={i} style={{background:C.bgCard,borderRadius:"14px",padding:"12px 14px",borderLeft:`3px solid ${borderColor}`,border:`1px solid rgba(255,255,255,0.06)`,borderLeftWidth:3,borderLeftColor:borderColor}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:typeLabelColor}}>{typeLabel}</span>
                    <div style={{display:"flex",alignItems:"center",gap:2}}>
                      <span style={{fontSize:"0.68rem",color:"rgba(232,245,233,0.25)",marginRight:4}}>{(isLifecycle||isRain)?fmtDate(entry.date):fmtTs(entry.date)}</span>
                      {isNote&&!isEditingNote&&<>{actionBtn("Edit","rgba(232,245,233,0.4)",()=>{setEditingNoteIdx(entry.idx);setEditingNoteText(entry.data.text);})}{actionBtn("Delete","#ef4444",()=>setDeleteNoteIdx(entry.idx))}</>}
                      {isAuto&&actionBtn("×","rgba(232,245,233,0.25)",()=>setDeleteNoteIdx(entry.idx))}
                      {isFeed&&!isEditingFeed&&<>{actionBtn("Edit","rgba(232,245,233,0.4)",()=>{setEditingFeedIdx(entry.idx);const qp=(entry.data.qty||"").split(" ");const d=parseDate(entry.data.date)||new Date();const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;const timeStr=`${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;setEditFeedData({nutrient:entry.data.nutrient||"",qty:qp[0]||"",unit:qp.slice(1).join(" ")||"tbsp",water:entry.data.water||"",intervalDays:"",date:dateStr,time:timeStr});})}{actionBtn("Delete","#ef4444",()=>setDeleteFeedIdx(entry.idx))}</>}
                      {isWater&&!isRain&&actionBtn("Delete","#ef4444",()=>setDeleteWaterIdx(entry.idx))}
                      {isWater&&isRain&&actionBtn("Delete","rgba(239,68,68,0.6)",()=>setDeleteWaterIdx(entry.idx))}
                      {isHarvest&&actionBtn("Delete","#ef4444",()=>setDeleteHarvestIdx(entry.idx))}
                    </div>
                  </div>
                  {isNote&&(isEditingNote?(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <textarea value={editingNoteText} onChange={e=>setEditingNoteText(e.target.value)} autoFocus style={{...iS,width:"100%",resize:"vertical",minHeight:60,borderColor:"#8b5cf6"}}/>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{onEditNote(crop.id,entry.idx,editingNoteText);setEditingNoteIdx(null);}} style={{flex:1,background:"#8b5cf6",color:"white",border:"none",borderRadius:"8px",padding:"8px",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>Save</button>
                        <button onClick={()=>setEditingNoteIdx(null)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"8px",fontSize:"0.82rem",color:"rgba(232,245,233,0.5)",cursor:"pointer"}}>Cancel</button>
                      </div>
                    </div>
                  ):<div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"0.92rem",color:"rgba(232,245,233,0.8)",lineHeight:1.5}}>{entry.data.text}</div>)}
                  {isAuto&&<div style={{fontSize:"0.88rem",color:C.green,fontWeight:500}}>{entry.data.text}</div>}
                  {isFeed&&(isEditingFeed?(
                    <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:4}}>
                      <input value={editFeedData.nutrient} onChange={e=>setEditFeedData(d=>({...d,nutrient:e.target.value}))} placeholder="Nutrient" style={iS}/>
                      <div style={{display:"flex",gap:6}}><input type="number" min="0" step="any" value={editFeedData.qty} onChange={e=>setEditFeedData(d=>({...d,qty:e.target.value}))} placeholder="Qty" style={{...iS,flex:1}}/><select value={editFeedData.unit} onChange={e=>{setEditFeedData(d=>({...d,unit:e.target.value}));e.target.blur();}} style={{...iS,padding:"9px 8px"}}>{FUNITS.map(u=><option key={u} style={{background:"#182218"}}>{u}</option>)}</select></div>
                      <input value={editFeedData.water} onChange={e=>setEditFeedData(d=>({...d,water:e.target.value}))} placeholder="Water (e.g. 1 gal)" style={iS}/>
                      <div style={{display:"flex",gap:6}}>
                        <input type="date" value={editFeedData.date} onChange={e=>setEditFeedData(d=>({...d,date:e.target.value}))} style={{...iS,flex:1}}/>
                        <input type="time" value={editFeedData.time} onChange={e=>setEditFeedData(d=>({...d,time:e.target.value}))} style={{...iS,flex:1}}/>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(245,158,11,0.08)",borderRadius:"8px",padding:"8px 10px",border:"1px solid rgba(245,158,11,0.25)"}}>
                        <span style={{fontSize:"0.78rem",color:"#fbbf24",flexShrink:0,fontWeight:600}}>🌿 Repeat every</span>
                        <input type="number" min="1" value={editFeedData.intervalDays||""} onChange={e=>setEditFeedData(d=>({...d,intervalDays:e.target.value}))} placeholder="-" style={{width:50,padding:"4px 8px",borderRadius:"6px",border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.06)",fontSize:"16px",color:"white",outline:"none",textAlign:"center"}}/>
                        <span style={{fontSize:"0.78rem",color:"#fbbf24"}}>days</span>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{
                          const n=titleCase(editFeedData.nutrient.trim());
                          const newDate=editFeedData.date&&editFeedData.time?`${editFeedData.date}T${editFeedData.time}:00`:editFeedData.date?`${editFeedData.date}T12:00:00`:entry.data.date;
                          onEditFeed(crop.id,entry.idx,{nutrient:n,qty:editFeedData.qty?`${editFeedData.qty} ${editFeedData.unit}`:null,water:editFeedData.water||null,date:newDate});
                          if(editFeedData.intervalDays&&Number(editFeedData.intervalDays)>0){const prev=schedules[n]||{};onUpdateSchedule(crop.id,n,{...prev,days:Number(editFeedData.intervalDays),qty:editFeedData.qty||prev.qty||"",unit:editFeedData.unit||prev.unit||"tbsp",water:editFeedData.water||prev.water||"",waterUnit:"gal"});}
                          setEditingFeedIdx(null);
                        }} style={{flex:1,background:C.green,color:"white",border:"none",borderRadius:"8px",padding:"8px",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>Save</button>
                        <button onClick={()=>setEditingFeedIdx(null)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"8px",fontSize:"0.82rem",color:"rgba(232,245,233,0.5)",cursor:"pointer"}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div>
                      <div style={{fontSize:"0.88rem",fontWeight:600,color:"#fbbf24"}}>{entry.data.nutrient}</div>
                      <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                        {entry.data.qty&&<span style={{fontSize:"0.72rem",fontWeight:600,color:"#92400e",background:"#fef3c7",padding:"2px 7px",borderRadius:"6px"}}>{entry.data.qty}</span>}
                        {entry.data.water&&<span style={{fontSize:"0.72rem",fontWeight:600,color:"#1d4ed8",background:"#dbeafe",padding:"2px 7px",borderRadius:"6px"}}>💧 {entry.data.water}</span>}
                      </div>
                    </div>
                  ))}
                  {isWater&&isRain&&<div style={{fontSize:"0.85rem",color:"#93c5fd",fontWeight:500}}>🌧 {entry.data.amount}" rainfall{entry.data.note?` — ${entry.data.note.replace(/^🌧 [0-9."]+ rainfall/,"")}`:""}</div>}
                  {isWater&&!isRain&&<div style={{fontSize:"0.85rem",color:"#60a5fa",fontWeight:500}}>💧 Watered</div>}
                  {isHarvest&&<div style={{fontSize:"0.85rem",color:"#c4b5fd",fontWeight:500}}>🌾 {entry.data.amount} {entry.data.unit}{entry.data.note?<span style={{color:"rgba(232,245,233,0.5)",fontWeight:400}}> — {entry.data.note}</span>:null}</div>}
                  {isLifecycle&&(
                    <div>
                      <div style={{fontSize:"0.85rem",color:"rgba(232,245,233,0.7)",fontWeight:500}}>{entry.data.emoji} {entry.data.label}</div>
                      {entry.data.detail&&<div style={{fontSize:"0.75rem",color:"rgba(232,245,233,0.4)",marginTop:3}}>{entry.data.detail}</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── HARVESTS ── */}
        {tab==="harvests"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {totalHarvest&&<div style={{background:"rgba(34,197,94,0.08)",borderRadius:"12px",padding:"12px 16px",border:"1px solid rgba(34,197,94,0.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:"0.78rem",color:C.green,fontWeight:600}}>Total harvested</div><div style={{fontSize:"1.1rem",fontWeight:800,color:C.green}}>{totalHarvest}</div></div>}
            <button onClick={()=>setShowHarvest(true)} style={{background:"#8b5cf6",color:"white",border:"none",borderRadius:"12px",padding:"13px",fontSize:"0.92rem",fontWeight:700,cursor:"pointer"}}>+ Log a Harvest</button>
            {(crop.harvests||[]).length===0&&<div style={{textAlign:"center",padding:"2rem 0",color:"rgba(232,245,233,0.2)",fontStyle:"italic"}}>No harvests logged yet.</div>}
            {[...(crop.harvests||[])].reverse().map((h,revIdx)=>{
              const realIdx=(crop.harvests||[]).length-1-revIdx;
              const isEditing=editingHarvestIdx===realIdx;
              const HUNITS=["g","oz","lb","kg","count","bundle","ml","L"];
              return(
                <div key={realIdx} style={{background:C.bgCard,borderRadius:"14px",padding:"12px 14px",borderLeft:"3px solid #8b5cf6",border:"1px solid rgba(255,255,255,0.06)",borderLeftWidth:3,borderLeftColor:"#8b5cf6"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:isEditing?8:0}}>
                    <span style={{fontSize:"0.68rem",color:"rgba(232,245,233,0.25)"}}>{fmtTs(h.date)}</span>
                    {!isEditing&&<div style={{display:"flex",gap:2}}>
                      <button onClick={()=>{setEditingHarvestIdx(realIdx);setEditHarvestData({amount:h.amount||"",unit:h.unit||"g",note:h.note||""});}} style={{background:"none",border:"none",color:"rgba(232,245,233,0.4)",fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Edit</button>
                      <button onClick={()=>setDeleteHarvestIdx(realIdx)} style={{background:"none",border:"none",color:"#ef4444",fontSize:"0.72rem",fontWeight:600,cursor:"pointer",padding:"2px 6px"}}>Delete</button>
                    </div>}
                  </div>
                  {isEditing?(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <div style={{display:"flex",gap:6}}><input type="number" value={editHarvestData.amount} onChange={e=>setEditHarvestData(d=>({...d,amount:e.target.value}))} placeholder="Amount" style={{...iS,flex:1}}/><select value={editHarvestData.unit} onChange={e=>setEditHarvestData(d=>({...d,unit:e.target.value}))} style={{...iS,padding:"9px 8px"}}>{HUNITS.map(u=><option key={u} style={{background:"#182218"}}>{u}</option>)}</select></div>
                      <input value={editHarvestData.note} onChange={e=>setEditHarvestData(d=>({...d,note:e.target.value}))} placeholder="Notes" style={{...iS,width:"100%"}}/>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{onEditHarvest(crop.id,realIdx,{amount:editHarvestData.amount?Number(editHarvestData.amount):null,unit:editHarvestData.unit,note:editHarvestData.note||null});setEditingHarvestIdx(null);}} style={{flex:1,background:"#8b5cf6",color:"white",border:"none",borderRadius:"8px",padding:"8px",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>Save</button>
                        <button onClick={()=>setEditingHarvestIdx(null)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",padding:"8px",fontSize:"0.82rem",color:"rgba(232,245,233,0.5)",cursor:"pointer"}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div>
                      <div style={{fontSize:"0.95rem",fontWeight:700,color:C.green,marginTop:4}}>{h.amount&&`${h.amount} ${h.unit}`}</div>
                      {h.note&&<div style={{fontSize:"0.78rem",color:"rgba(232,245,233,0.45)",marginTop:3,fontStyle:"italic"}}>{h.note}</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Footer actions - sits above nav bar */}
      <div style={{position:"absolute",bottom:"calc(max(80px, env(safe-area-inset-bottom) + 62px))",left:0,right:0,padding:"10px 16px 12px",background:`linear-gradient(to top, ${C.bg} 70%, transparent)`,display:"flex",gap:8,flexShrink:0}}>
        <button onClick={()=>{if(!wateredToday){onWater(crop.id);setWateredToday(true);showToast("💧 Watered!");} }} disabled={wateredToday} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"13px",borderRadius:"14px",border:"none",background:wateredToday?"rgba(34,197,94,0.15)":"rgba(59,130,246,0.9)",color:wateredToday?C.green:"white",fontSize:"0.88rem",fontWeight:700,cursor:wateredToday?"default":"pointer",transition:"all 0.2s"}}>💧 {wateredToday?"Watered ✓":"Water"}</button>
        <button onClick={()=>setShowFeed(true)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"13px",borderRadius:"14px",border:"none",background:"rgba(245,158,11,0.9)",color:"white",fontSize:"0.88rem",fontWeight:700,cursor:"pointer"}}>🌿 Feed</button>
      </div>

      {/* Toast */}
      {toast&&<div style={{position:"absolute",bottom:"calc(max(80px, env(safe-area-inset-bottom) + 62px) + 70px)",left:"50%",transform:"translateX(-50%)",background:"rgba(34,197,94,0.92)",color:"white",fontSize:"12px",fontWeight:600,padding:"7px 16px",borderRadius:"20px",whiteSpace:"nowrap",pointerEvents:"none",boxShadow:"0 4px 16px rgba(34,197,94,0.4)"}}>{toast}</div>}

      {/* Stage picker */}
      <StagePickerSheet show={showStagePicker} currentStage={crop.stage} onClose={()=>setShowStagePicker(false)} onSelect={(stage,date)=>{setShowStagePicker(false);if(stage==="Done"){onMarkDone({...crop,stage:"Done"});return;}if(stage==="Lost"){onMarkLost({...crop,stage:"Lost"});return;}onChangeStage(crop.id,stage,date);}}/>

      {/* Confirm sheets */}
      <DarkConfirmSheet show={confirmDone} onClose={()=>{setConfirmDone(false);setFinalNote("");}} title="Mark as Done?" message={"This will archive "+crop.name+(crop.variety?" ("+crop.variety+")":"")+" and remove it from your active crops."} confirmLabel="Mark Done" danger={false} onConfirm={()=>{onMarkDone({...crop,stage:"Done",finalNote:finalNote.trim()||null});setFinalNote("");}} extraContent={<textarea value={finalNote} onChange={e=>setFinalNote(e.target.value)} placeholder="Final notes (optional) — yield, observations, would you grow again?" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"10px 12px",fontSize:"0.85rem",color:"white",outline:"none",resize:"none",minHeight:80,marginTop:4,boxSizing:"border-box",fontFamily:"inherit"}}/>}/>
      <DarkConfirmSheet show={confirmLost} onClose={()=>{setConfirmLost(false);setFinalNote("");}} title="Mark as Lost?" message={"This will archive "+crop.name+(crop.variety?" ("+crop.variety+")":"")+" as a loss."} confirmLabel="Mark Lost" danger={true} onConfirm={()=>{onMarkLost({...crop,stage:"Lost",finalNote:finalNote.trim()||null});setFinalNote("");}} extraContent={<textarea value={finalNote} onChange={e=>setFinalNote(e.target.value)} placeholder="What happened? (optional) — disease, pests, weather, timing..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"10px 12px",fontSize:"0.85rem",color:"white",outline:"none",resize:"none",minHeight:80,marginTop:4,boxSizing:"border-box",fontFamily:"inherit"}}/>}/>
      <DarkConfirmSheet show={confirmDelete} onClose={()=>setConfirmDelete(false)} title="Delete crop?" message={`${crop.name}${crop.variety?` (${crop.variety})`:""} will be permanently deleted. This cannot be undone.`} confirmLabel="Delete" danger={true} onConfirm={()=>onDeleteCrop(crop.id)}/>
      <DarkConfirmSheet show={deleteNoteIdx!==null} onClose={()=>setDeleteNoteIdx(null)} title="Delete entry?" message="This log entry will be permanently deleted." confirmLabel="Delete" danger={true} onConfirm={()=>{onDeleteNote(crop.id,deleteNoteIdx);setDeleteNoteIdx(null);}}/>
      <DarkConfirmSheet show={confirmDeleteStage!==null} onClose={()=>setConfirmDeleteStage(null)} title="Delete stage entry?" message={confirmDeleteStage?`Remove the "${confirmDeleteStage.stage}" entry from this crop's timeline? The crop's current stage will revert to the most recent remaining entry.`:""} confirmLabel="Delete" danger={true} onConfirm={()=>{onDeleteStageHistory(crop.id,confirmDeleteStage);setConfirmDeleteStage(null);}}/>
      <DarkConfirmSheet show={deleteFeedIdx!==null} onClose={()=>setDeleteFeedIdx(null)} title="Delete feed entry?" message="This feed log entry will be permanently deleted." confirmLabel="Delete" danger={true} onConfirm={()=>{onDeleteFeed(crop.id,deleteFeedIdx);setDeleteFeedIdx(null);}}/>
      <DarkConfirmSheet show={deleteWaterIdx!==null} onClose={()=>setDeleteWaterIdx(null)} title={deleteWaterIdx!==null&&(crop.waterLog||[])[deleteWaterIdx]?.source==="rain"?"Delete rainfall entry?":"Delete watering?"} message={deleteWaterIdx!==null&&(crop.waterLog||[])[deleteWaterIdx]?.source==="rain"?"This auto-logged rainfall entry will be removed from the log.":"This watering entry will be permanently deleted."} confirmLabel="Delete" danger={true} onConfirm={()=>{onDeleteWater(crop.id,deleteWaterIdx);setDeleteWaterIdx(null);}}/>
      <DarkConfirmSheet show={deleteHarvestIdx!==null} onClose={()=>setDeleteHarvestIdx(null)} title="Delete harvest?" message="This harvest entry will be permanently deleted." confirmLabel="Delete" danger={true} onConfirm={()=>{onDeleteHarvest(crop.id,deleteHarvestIdx);setDeleteHarvestIdx(null);}}/>
      <DarkConfirmSheet show={!!confirmDeleteSched} onClose={()=>setConfirmDeleteSched(null)} title="Delete schedule?" message={confirmDeleteSched?`The feeding schedule for ${confirmDeleteSched} will be removed.`:""} confirmLabel="Delete" danger={true} onConfirm={()=>{onDeleteSchedule(crop.id,confirmDeleteSched);setConfirmDeleteSched(null);}}/>

      {/* Feed sheet */}
      <FeedLogSheet show={showFeed} crop={crop} nutrients={nutrients} onClose={()=>setShowFeed(false)} onAddFeed={onAddFeed} onUpdateSchedule={onUpdateSchedule} onAddNutrient={onAddNutrient}/>

      {/* Harvest sheet */}
      <HarvestSheet show={showHarvest} onClose={()=>setShowHarvest(false)} onLog={(h)=>{onLogHarvest(crop.id,h);showToast("Harvest logged!");setShowHarvest(false);}}/>

      {/* Transplant sheet */}
      <TransplantSheet show={showTransplant} crop={crop} locations={locations} onClose={()=>setShowTransplant(false)} onTransplant={onTransplant}/>
    </div>
  );
}

// ── Harvest Sheet ──────────────────────────────────────────────
function HarvestSheet({show,onClose,onLog}) {
  const [amount,setAmount]=useState("");
  const [unit,setUnit]=useState("g");
  const [note,setNote]=useState("");
  const HUNITS=["g","oz","lb","kg","count","bundle","ml","L"];
  useEffect(()=>{if(!show){setAmount("");setNote("");}}, [show]);
  return(
    <DarkSheet show={show} onClose={onClose} title="Log Harvest">
      <div style={{display:"flex",flexDirection:"column",gap:12,paddingTop:4}}>
        <div style={{display:"flex",gap:8}}>
          <input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="Amount" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"11px 14px",fontSize:"0.95rem",color:"white",outline:"none"}}/>
          <select value={unit} onChange={e=>setUnit(e.target.value)} style={{background:"rgba(255,255,255,0.1)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"11px 12px",fontSize:"0.88rem",color:"white",outline:"none"}}>{HUNITS.map(u=><option key={u} style={{background:"#182218"}}>{u}</option>)}</select>
        </div>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Notes (optional)" style={{background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"11px 14px",fontSize:"0.95rem",color:"white",outline:"none"}}/>
        <button onClick={()=>{if(!amount&&!note)return;onLog({amount:amount?Number(amount):null,unit,note:note||null,date:new Date().toISOString()});setAmount("");setNote("");onClose();}} disabled={!amount&&!note} style={{background:(!amount&&!note)?"rgba(255,255,255,0.06)":"#8b5cf6",color:(!amount&&!note)?"rgba(232,245,233,0.25)":"white",border:"none",borderRadius:"12px",padding:"14px",fontSize:"0.92rem",fontWeight:700,cursor:(!amount&&!note)?"not-allowed":"pointer"}}>Save Harvest</button>
      </div>
    </DarkSheet>
  );
}

// ── Feed Log Sheet ─────────────────────────────────────────────
function FeedLogSheet({show,crop,nutrients,onClose,onAddFeed,onUpdateSchedule,onAddNutrient}) {
  const [input,setInput]=useState("");
  const [qty,setQty]=useState("");
  const [unit,setUnit]=useState("tbsp");
  const [isLiquid,setIsLiquid]=useState(false);
  const [waterQty,setWaterQty]=useState("");
  const [waterUnit,setWaterUnit]=useState("gal");
  const [showDrop,setShowDrop]=useState(false);
  const [askInterval,setAskInterval]=useState(false);
  const [intervalDays,setIntervalDays]=useState("");
  const [saved,setSaved]=useState(false);
  const [feedDate,setFeedDate]=useState(todayStr());
  const [feedTime,setFeedTime]=useState(()=>{const n=new Date();return`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;});
  const getFeedDate=()=>{if(feedDate&&feedTime){const d=new Date(`${feedDate}T${feedTime}:00`);return isNaN(d)?ts():d.toISOString();}return ts();};
  const schedules=crop?.feedSchedules||{};
  const feedLog=crop?.feedLog||[];
  const FEED_UNITS=["tsp","tbsp","cup","fl oz","ml","L","oz","lb","g"];
  const WATER_UNITS=["fl oz","cup","pt","qt","gal","ml","L"];
  const usageCounts={};feedLog.forEach(f=>{if(f.nutrient)usageCounts[f.nutrient]=(usageCounts[f.nutrient]||0)+1;});
  const allNutrients=[...new Set([...["Fish emulsion 2-3-1","Tomato tone 3-4-6","Kelp meal","Compost tea","Worm castings","Blood meal","Bone meal","Balanced 10-10-10"],...(nutrients||[]),...Object.keys(schedules),...feedLog.map(f=>f.nutrient).filter(Boolean)])];
  const ranked=[...allNutrients].sort((a,b)=>(usageCounts[b]||0)-(usageCounts[a]||0)||a.localeCompare(b));
  const filtered=input.trim()?ranked.filter(n=>n.toLowerCase().includes(input.toLowerCase())):ranked;
  const reset=()=>{
    const n=new Date();
    setInput("");setQty("");setIsLiquid(false);setWaterQty("");setAskInterval(false);setIntervalDays("");setSaved(false);
    setFeedDate(todayStr());
    setFeedTime(`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`);
  };
  useEffect(()=>{if(!show)reset();},[show]);
  const iStyle={background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"11px 14px",fontSize:"16px",color:"white",outline:"none"};
  const selectN=n=>{setInput(n);setShowDrop(false);};
  const handleSave=()=>{
    if(!input.trim())return;
    const name=titleCase(input.trim());
    const qtyStr=qty?`${qty} ${unit}`:null;
    const waterStr=(isLiquid&&waterQty)?`${waterQty} ${waterUnit}`:null;
    if(!schedules[name]){setAskInterval(true);return;}
    onAddFeed(crop.id,name,qtyStr,waterStr,null,getFeedDate());
    if(onAddNutrient)onAddNutrient(name);
    setSaved(true);setTimeout(()=>{reset();onClose();},800);
  };
  const handleSaveWithInterval=()=>{
    const name=titleCase(input.trim());
    const qtyStr=qty?`${qty} ${unit}`:null;
    const waterStr=(isLiquid&&waterQty)?`${waterQty} ${waterUnit}`:null;
    onAddFeed(crop.id,name,qtyStr,waterStr,null,getFeedDate());
    if(intervalDays&&Number(intervalDays)>0)onUpdateSchedule(crop.id,name,{days:Number(intervalDays),qty:qty||"",unit,water:waterQty||"",waterUnit});
    if(onAddNutrient)onAddNutrient(name);
    setSaved(true);setTimeout(()=>{reset();onClose();},800);
  };
  if(askInterval) return(
    <DarkSheet show={show} onClose={()=>{setAskInterval(false);reset();onClose();}} title="Set feeding schedule?">
      <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:4}}>
        <div style={{background:"rgba(34,197,94,0.08)",borderRadius:"10px",padding:"12px 14px",border:"1px solid rgba(34,197,94,0.2)",fontSize:"0.88rem",color:"rgba(232,245,233,0.7)"}}>First time logging <strong style={{color:"white"}}>{input.trim()}</strong>. Want to set a repeat schedule?</div>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:600,color:"rgba(232,245,233,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Feed every (days)</div>
          <input type="number" value={intervalDays} onChange={e=>setIntervalDays(e.target.value)} placeholder="e.g. 7" style={{...iStyle,width:"100%"}}/>
        </div>
        <button onClick={handleSaveWithInterval} disabled={!intervalDays} style={{background:!intervalDays?"rgba(255,255,255,0.06)":C.green,color:!intervalDays?"rgba(232,245,233,0.25)":"white",border:"none",borderRadius:"12px",padding:"14px",fontSize:"0.92rem",fontWeight:700,cursor:intervalDays?"pointer":"not-allowed"}}>Set Schedule & Save</button>
        <button onClick={()=>{const name=titleCase(input.trim());const qtyStr=qty?`${qty} ${unit}`:null;const waterStr=(isLiquid&&waterQty)?`${waterQty} ${waterUnit}`:null;onAddFeed(crop.id,name,qtyStr,waterStr,null,getFeedDate());if(onAddNutrient)onAddNutrient(name);reset();onClose();}} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"13px",fontSize:"0.88rem",fontWeight:600,color:"rgba(232,245,233,0.6)",cursor:"pointer"}}>Save without a schedule</button>
      </div>
    </DarkSheet>
  );
  return(
    <DarkSheet show={show} onClose={()=>{reset();onClose();}} title="Log Feed">
      <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:4}}>
        <div style={{position:"relative"}}>
          <div style={{fontSize:"0.72rem",fontWeight:600,color:"rgba(232,245,233,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Nutrient / Fertilizer</div>
          <input value={input} onChange={e=>{setInput(e.target.value);setShowDrop(true);}} onFocus={()=>setShowDrop(true)} placeholder="Type or choose..." style={{...iStyle,width:"100%"}}/>
          {input&&schedules[input.trim()]&&<div style={{marginTop:5,fontSize:"0.75rem",color:C.green,fontWeight:500}}>Schedule: every {scheduleDays(schedules[input.trim()])}d</div>}
          {showDrop&&(
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a2b1c",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"12px",boxShadow:"0 8px 28px rgba(0,0,0,0.5)",zIndex:50,maxHeight:240,overflowY:"auto",marginTop:4}}>
            {input.trim()&&!ranked.map(n=>n.toLowerCase()).includes(input.trim().toLowerCase())&&<div onClick={()=>selectN(input.trim())} style={{padding:"14px",cursor:"pointer",fontSize:"0.9rem",color:C.green,fontWeight:600,borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(34,197,94,0.06)"}}>+ Add "{input.trim()}"</div>}
            {filtered.map(n=>{const sched=schedules[n];const count=usageCounts[n]||0;return(
              <div key={n} onClick={()=>selectN(n)} style={{padding:"13px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,minHeight:"44px"}}>
                <span style={{fontSize:"0.9rem",color:"rgba(232,245,233,0.85)"}}>{n}</span>
                <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                  {count>0&&<span style={{fontSize:"0.7rem",color:"rgba(232,245,233,0.35)",fontWeight:600}}>{count}×</span>}
                  {sched&&<span style={{fontSize:"0.65rem",color:C.green,fontWeight:700,background:"rgba(34,197,94,0.12)",padding:"2px 7px",borderRadius:"6px"}}>every {scheduleDays(sched)}d</span>}
                </div>
              </div>
            );})}
            </div>
          )}
        </div>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:600,color:"rgba(232,245,233,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Quantity <span style={{fontWeight:400,color:"rgba(232,245,233,0.25)"}}>(optional)</span></div>
          <div style={{display:"flex",gap:8}}>
            <input type="number" min="0" step="any" value={qty} onFocus={()=>setShowDrop(false)} onChange={e=>setQty(e.target.value)} placeholder="e.g. 2" style={{...iStyle,flex:1}}/>
            <select value={unit} onFocus={()=>setShowDrop(false)} onChange={e=>setUnit(e.target.value)} style={{...iStyle,padding:"11px 10px",color:"rgba(232,245,233,0.7)"}}>{FEED_UNITS.map(u=><option key={u} style={{background:"#182218"}}>{u}</option>)}</select>
          </div>
        </div>
        <div>
          <div onClick={()=>{setShowDrop(false);setIsLiquid(v=>!v);}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:isLiquid?"rgba(59,130,246,0.08)":"rgba(255,255,255,0.04)",border:`1.5px solid ${isLiquid?"rgba(59,130,246,0.3)":"rgba(255,255,255,0.1)"}`,borderRadius:"12px",cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:"6px",flexShrink:0,transition:"all 0.15s",background:isLiquid?"#3b82f6":"transparent",border:`1.5px solid ${isLiquid?"#3b82f6":"rgba(255,255,255,0.25)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {isLiquid&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
            <div><div style={{fontSize:"0.9rem",fontWeight:600,color:"rgba(232,245,233,0.85)"}}>Diluted in water</div><div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.35)",marginTop:1}}>Check if mixed with water before applying</div></div>
          </div>
          {isLiquid&&<div style={{display:"flex",gap:8,marginTop:8}}>
            <input type="number" min="0" step="any" value={waterQty} onFocus={()=>setShowDrop(false)} onChange={e=>setWaterQty(e.target.value)} placeholder="e.g. 1" style={{...iStyle,flex:1}}/>
            <select value={waterUnit} onFocus={()=>setShowDrop(false)} onChange={e=>setWaterUnit(e.target.value)} style={{...iStyle,padding:"11px 10px",color:"rgba(232,245,233,0.7)"}}>{WATER_UNITS.map(u=><option key={u} style={{background:"#182218"}}>{u}</option>)}</select>
          </div>}
        </div>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:600,color:"rgba(232,245,233,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Date &amp; Time</div>
          <div style={{display:"flex",gap:8}}>
            <input type="date" value={feedDate} onFocus={()=>setShowDrop(false)} onChange={e=>setFeedDate(e.target.value)} style={{...iStyle,flex:1}}/>
            <input type="time" value={feedTime} onFocus={()=>setShowDrop(false)} onChange={e=>setFeedTime(e.target.value)} style={{...iStyle,flex:1}}/>
          </div>
        </div>
        <button onClick={handleSave} disabled={!input.trim()} style={{background:saved?"rgba(34,197,94,0.15)":!input.trim()?"rgba(255,255,255,0.06)":C.green,border:saved?`1px solid ${C.green}`:"none",color:saved?C.green:!input.trim()?"rgba(232,245,233,0.25)":"white",borderRadius:"12px",padding:"14px",fontSize:"0.92rem",fontWeight:700,cursor:input.trim()?"pointer":"not-allowed",transition:"all 0.25s"}}>{saved?"✓ Saved!":"Save Feed Log"}</button>
      </div>
    </DarkSheet>
  );
}

// ── Transplant Sheet ───────────────────────────────────────────
function TransplantSheet({show,crop,locations,onClose,onTransplant}) {
  const [toLoc,setToLoc]=useState("");
  const [date,setDate]=useState(todayStr());
  const [container,setContainer]=useState(false);
  const [contSize,setContSize]=useState("");
  const available=(locations||[]).filter(l=>l!==crop?.location);
  useEffect(()=>{if(show){setToLoc("");setDate(todayStr());setContainer(false);setContSize("");}}, [show,crop?.location]);
  const iStyle={background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:"10px",padding:"11px 14px",fontSize:"16px",color:"white",outline:"none"};
  return(
    <DarkSheet show={show} onClose={onClose} title="Transplant / Move">
      <div style={{display:"flex",flexDirection:"column",gap:14,paddingTop:4}}>
        <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"11px 14px",border:"1px solid rgba(255,255,255,0.08)",fontSize:"0.88rem",color:"rgba(232,245,233,0.55)"}}>Currently in: <span style={{color:"rgba(232,245,233,0.88)",fontWeight:600}}>{crop?.location}</span>{crop?.containerSize&&<span style={{color:"rgba(232,245,233,0.4)"}}> · {crop.containerSize}</span>}</div>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:600,color:"rgba(232,245,233,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Move to *</div>
          <select value={toLoc} onChange={e=>setToLoc(e.target.value)} style={{...iStyle,width:"100%",appearance:"none",color:toLoc?"white":"rgba(232,245,233,0.3)"}}>
            <option value="" style={{background:"#182218"}}>Select location...</option>
            {available.map(l=><option key={l} value={l} style={{background:"#182218"}}>{l}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:"0.72rem",fontWeight:600,color:"rgba(232,245,233,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Transplant Date</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...iStyle,width:"100%",colorScheme:"dark"}}/>
        </div>
        <div onClick={()=>setContainer(v=>!v)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:container?"rgba(59,130,246,0.08)":"rgba(255,255,255,0.04)",border:`1.5px solid ${container?"rgba(59,130,246,0.3)":"rgba(255,255,255,0.1)"}`,borderRadius:"12px",cursor:"pointer"}}>
          <div style={{width:20,height:20,borderRadius:"6px",flexShrink:0,background:container?"#3b82f6":"transparent",border:`1.5px solid ${container?"#3b82f6":"rgba(255,255,255,0.25)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {container&&<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
          <div><div style={{fontSize:"0.9rem",fontWeight:600,color:"rgba(232,245,233,0.85)"}}>Going into a container</div><div style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.35)",marginTop:1}}>Pot, bucket, bag, DWC, etc.</div></div>
        </div>
        {container&&<input value={contSize} onChange={e=>setContSize(e.target.value)} placeholder="e.g. 5 gallon fabric pot..." style={{...iStyle,width:"100%"}}/>}
        <button onClick={()=>{if(toLoc){onTransplant(crop.id,toLoc,date,container,contSize||"");onClose();}}} disabled={!toLoc||(container&&!contSize.trim())} style={{background:(!toLoc||(container&&!contSize.trim()))?"rgba(255,255,255,0.06)":C.green,color:(!toLoc||(container&&!contSize.trim()))?"rgba(232,245,233,0.25)":"white",border:"none",borderRadius:"12px",padding:"14px",fontSize:"0.92rem",fontWeight:700,cursor:(!toLoc||(container&&!contSize.trim()))?"not-allowed":"pointer"}}>Confirm Transplant</button>
      </div>
    </DarkSheet>
  );
}


function StagePickerSheet({show,currentStage,onSelect,onClose}) {
  const [date,setDate]=useState(todayStr());
  const [chosen,setChosen]=useState(null);
  useEffect(()=>{if(show){setDate(todayStr());setChosen(null);}}, [show]);
  const ACTIVE_STAGES=["Seed","Seedling","Vegetative","Flowering","Fruiting","Harvesting"];
  const END_STAGES=["Done","Lost"];
  return(
    <Sheet show={show} onClose={onClose} title="Change Stage">
      <div style={{display:"flex",flexDirection:"column",gap:"14px",paddingTop:"4px"}}>
        <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
          {ACTIVE_STAGES.map(s=>{
            const sc=STAGE_COLORS[s]||STAGE_COLORS.Seed;
            const isCurrent=s===currentStage;
            const isChosen=s===chosen;
            return(
              <button key={s} onClick={()=>setChosen(isCurrent?null:s)}
                style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",borderRadius:"12px",border:`2px solid ${isChosen?sc.dot:isCurrent?"#d1d5db":C.border}`,background:isChosen?sc.bg:isCurrent?"#f9fafb":"white",cursor:isCurrent?"default":"pointer",textAlign:"left"}}>
                <div style={{width:"10px",height:"10px",borderRadius:"50%",background:sc.dot,flexShrink:0}}/>

                {isChosen&&<span style={{fontSize:"0.9rem"}}>✓</span>}
              </button>

          })}
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:"6px",display:"flex",flexDirection:"column",gap:"6px"}}>

                <button key={s} onClick={()=>setChosen(isCurrent?null:s)}
                  style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",borderRadius:"12px",border:`2px solid ${isChosen?"#fca5a5":isCurrent?"#d1d5db":C.border}`,background:isChosen?"#fef2f2":isCurrent?"#f9fafb":"white",cursor:isCurrent?"default":"pointer",textAlign:"left"}}>

                  {isCurrent&&<span style={{fontSize:"0.72rem",color:C.textFaint,fontWeight:500}}>Current</span>}
                  {isChosen&&<span style={{fontSize:"0.9rem"}}>✓</span>}
                  {!isCurrent&&!isChosen&&<span style={{fontSize:"0.72rem",color:"#dc2626",fontWeight:500}}>Archives crop</span>}
                </button>
              );
            })}
          </div>
        </div>
        {chosen&&chosen!==currentStage&&(
          <>
            <div>
              <div style={{fontSize:"0.78rem",fontWeight:600,color:C.textSub,marginBottom:"6px",letterSpacing:"0.04em",textTransform:"uppercase"}}>Date of change</div>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} max={todayStr()}
                style={{width:"100%",padding:"12px 14px",borderRadius:"10px",border:`1.5px solid ${C.border}`,fontSize:"0.95rem",background:"white",outline:"none"}}/>
            </div>
            <button onClick={()=>{if(chosen&&date)onSelect(chosen,date);}} style={{background:END_STAGES.includes(chosen)?"#ef4444":C.green,color:"white",border:"none",borderRadius:"12px",padding:"14px",fontWeight:700,fontSize:"0.95rem",cursor:"pointer"}}>
              {END_STAGES.includes(chosen)?`Mark as ${chosen}`:`Change to ${chosen}`}
            </button>
          </>
        )}
      </div>
    </Sheet>
  );
}

// ── CropCard (used for orphaned crops on dashboard) ────────────
function CropCard({crop,onClick,onWater}) {
  const acc=cropAccent(crop);
  const sc=STAGE_COLORS[crop.stage]||STAGE_COLORS.Seed;
  const dInStage=daysSinceStage(crop);
  const manualWaterLog=(crop.waterLog||[]).filter(w=>!w.auto||w.source!=="rain");
  const lastWater=manualWaterLog.length?manualWaterLog[manualWaterLog.length-1]:null;
  const daysWater=lastWater?daysAgo(lastWater.date):null;
  return(
    <div onClick={onClick} style={{background:"white",borderRadius:"14px",overflow:"hidden",border:`1px solid ${C.border}`,cursor:"pointer",userSelect:"none"}}>
      <div style={{height:"3px",background:`linear-gradient(to right,${acc.from},${acc.to})`}}/>
      <div style={{padding:"12px 14px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",color:C.textFaint,textTransform:"uppercase",marginBottom:"2px"}}>{crop.name}</div>
        <div style={{fontFamily:F.serif,fontStyle:"italic",fontSize:"0.95rem",color:C.text,marginBottom:"6px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>{crop.variety||crop.name}{crop.label?<span style={{fontStyle:"normal",fontSize:"0.68rem",fontFamily:F.sans,fontWeight:700,color:C.green,background:"rgba(34,197,94,0.14)",border:"1px solid rgba(34,197,94,0.3)",padding:"1px 8px",borderRadius:"7px"}}>{crop.label}</span>:null}</div>
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <div style={{width:"7px",height:"7px",borderRadius:"50%",background:sc.dot}}/>
          <span style={{fontSize:"0.78rem",fontWeight:600,color:sc.text}}>{crop.stage}</span>
          {dInStage!==null&&<span style={{fontSize:"0.72rem",color:C.textFaint}}>· {dInStage}d</span>}
          {daysWater!==null&&<span style={{fontSize:"0.72rem",color:C.textFaint,marginLeft:"auto"}}>💧 {daysWater===0?"today":`${daysWater}d ago`}</span>}
        </div>
      </div>
    </div>
  );
}

  const emoji=cropEmoji(crop);
  const iconBg=acc.from;
  const manualWl=(crop.waterLog||[]).filter(w=>!w.auto||w.source!=="rain");
  const lastWater=manualWl.length?[...manualWl].sort((a,b)=>parseDate(b.date)-parseDate(a.date))[0]:null;
  const daysWater=lastWater?daysAgo(lastWater.date):null;
  const fl=crop.feedLog||[];
  const lastFeed=fl.length?[...fl].sort((a,b)=>parseDate(b.date)-parseDate(a.date))[0]:null;
  const daysFeed=lastFeed?daysAgo(lastFeed.date):null;
  const fs=crop.feedSchedules||{};
  const feedOverdue=Object.entries(fs).some(([n,d])=>{
    const l=[...fl].reverse().find(f=>f.nutrient===n);
    return l&&daysAgo(l.date)>=scheduleDays(d);
  });
  const dtm=crop.daysToMaturity?Number(crop.daysToMaturity):null;
  const sowDate=crop.seedDate?parseDate(crop.seedDate):null;
  const daysGrown=sowDate?Math.max(0,Math.round((new Date()-sowDate)/864e5)):null;
  const daysLeft=dtm&&daysGrown!==null?Math.max(0,dtm-daysGrown):null;
  const waterLabel=daysWater===null?null:daysWater===0?"Today":daysWater===1?"Yesterday":`${daysWater}d ago`;
  const feedLabel=daysFeed===null?null:feedOverdue?"Overdue":daysFeed===0?"Today":daysFeed===1?"Yesterday":`${daysFeed}d ago`;

  return(
    <div style={{background:"rgba(255,255,255,0.05)",borderRadius:"14px",border:`1px solid ${feedOverdue?"rgba(251,191,36,0.22)":"rgba(255,255,255,0.07)"}`,overflow:"hidden",userSelect:"none"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 12px 11px"}}>
        {/* Crop icon */}
        <div onClick={onTap} style={{width:40,height:40,borderRadius:"11px",background:`${iconBg}33`,border:`1px solid ${iconBg}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.35rem",flexShrink:0,cursor:"pointer"}}>
          {emoji}
        </div>
        {/* Name */}
        <div onClick={onTap} style={{flex:1,minWidth:0,cursor:"pointer"}}>
          <div style={{fontSize:"1rem",fontWeight:600,color:"rgba(232,245,233,0.92)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",lineHeight:1.2,display:"flex",alignItems:"center",gap:6}}>
            <span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{crop.variety||crop.name}</span>{crop.label?<span style={{flexShrink:0,fontWeight:700,fontSize:"0.66rem",color:C.green,background:"rgba(34,197,94,0.14)",border:"1px solid rgba(34,197,94,0.3)",padding:"1px 8px",borderRadius:"7px"}}>{crop.label}</span>:null}
          </div>
          {/* Stat strip inline below name */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"nowrap",overflow:"hidden"}}>
            {sortMode==="stage"?(
              <span style={{display:"flex",alignItems:"center",gap:4,background:`${sc.dot}20`,border:`1px solid ${sc.dot}35`,borderRadius:"20px",padding:"2px 7px",flexShrink:0}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:sc.dot,display:"inline-block",flexShrink:0}}/>
                <span style={{fontSize:"0.7rem",fontWeight:600,color:sc.dot}}>{crop.stage}</span>
              </span>
            ):sortMode==="feed"?(
              // Feed sort — show only feed stat so ordering is clear
              feedLabel?(
                <span style={{fontSize:"0.72rem",color:feedOverdue?"#fbbf24":"rgba(232,245,233,0.6)",fontWeight:feedOverdue?600:400,flexShrink:0}}>
                  🌿 {feedLabel}
                </span>
              ):(
                <span style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.25)",flexShrink:0}}>🌿 Never fed</span>
              )
            ):(
              <>
                {waterLabel&&(
                  <span style={{fontSize:"0.72rem",color:daysWater===0?"#4ade80":"rgba(232,245,233,0.45)",flexShrink:0}}>
                    💧 {waterLabel}
                  </span>
                )}
                {feedLabel&&(
                  <span style={{fontSize:"0.72rem",color:feedOverdue?"#fbbf24":"rgba(232,245,233,0.45)",fontWeight:feedOverdue?600:400,flexShrink:0}}>
                    🌿 {feedLabel}
                  </span>
                )}
                {daysLeft!==null&&(
                  <span style={{fontSize:"0.72rem",color:"rgba(232,245,233,0.35)",flexShrink:0}}>
                    ☀ {daysLeft===0?"ready":`${daysLeft}d`}
                  </span>
                )}
              </>
            )}
          </div>
        </div>
        {/* Quick action buttons */}
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();onWater();}} aria-label="Log water" style={{width:34,height:34,borderRadius:"10px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"1rem"}}>💧</button>
          <button onClick={e=>{e.stopPropagation();onFeed();}} aria-label="Log feed" style={{width:34,height:34,borderRadius:"10px",background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:"1rem"}}>🌿</button>
        </div>
      </div>
    </div>
  );
}

// ── Feed All Sheet ─────────────────────────────────────────────

        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 0"}}>

        </div>

          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {step==="select"&&<button onClick={()=>{if(allSelected){const s={};(crops||[]).forEach(c=>{s[c.id]=false;});setSelected(s);}else{const s={};(crops||[]).forEach(c=>{s[c.id]=true;});setSelected(s);}}} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"8px",padding:"5px 10px",fontSize:"0.75rem",fontWeight:600,color:"rgba(232,245,233,0.6)",cursor:"pointer"}}>{allSelected?"Deselect all":"Select all"}</button>}
            <button onClick={()=>{reset();onClose();}} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:28,height:28,color:"rgba(232,245,233,0.6)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem"}}>✕</button>
          </div>

        {step==="select"&&(

            {(crops||[]).map(c=>{
              const acc=cropAccent(c);

              return(

                  <div style={{width:22,height:22,borderRadius:6,background:isSelected?C.green:"rgba(255,255,255,0.08)",border:`2px solid ${isSelected?C.green:"rgba(255,255,255,0.2)"}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>

                  <div style={{flex:1,minWidth:0}}>

              {filtered.map(n=><div key={n} onClick={()=>{setInput(n);setShowDrop(false);}} style={{padding:"13px 14px",cursor:"pointer",fontSize:"0.9rem",color:"rgba(232,245,233,0.85)",borderBottom:"1px solid rgba(255,255,255,0.05)",minHeight:"44px",display:"flex",alignItems:"center"}}>{n}</div>)}

          <button onClick={()=>setConfirming(true)} disabled={!input.trim()} style={{background:!input.trim()?"rgba(255,255,255,0.06)":"#f59e0b",color:!input.trim()?"rgba(232,245,233,0.25)":"white",border:"none",borderRadius:"12px",padding:"14px",fontSize:"0.92rem",fontWeight:700,cursor:input.trim()?"pointer":"not-allowed"}}>Review & Confirm</button>
          {confirming&&(
            <div style={{position:"fixed",inset:0,zIndex:460,display:"flex",alignItems:"flex-end"}} onClick={()=>setConfirming(false)}>
              <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)"}}/>
              <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"100%",background:"#1a2b1c",borderRadius:"20px 20px 0 0",padding:"20px 20px max(24px,env(safe-area-inset-bottom))"}}>
                <div style={{width:36,height:4,borderRadius:2,background:"rgba(255,255,255,0.2)",margin:"0 auto 16px"}}/>
                <div style={{fontSize:"1rem",fontWeight:700,color:"white",marginBottom:12}}>Confirm Feeding</div>
                <div style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:"12px",padding:"14px",marginBottom:16}}>
                  <div style={{fontSize:"0.82rem",fontWeight:700,color:"#fbbf24",marginBottom:4}}>Apply to {selectedIds.length} crop{selectedIds.length!==1?"s":""} in {location}</div>
                  <div style={{fontSize:"0.9rem",color:"rgba(232,245,233,0.85)"}}><strong>{input.trim()}</strong>{qty?` · ${qty} ${unit}`:""}{isLiquid&&waterQty?` · 💧 ${waterQty} ${waterUnit}`:""}</div>
                  {setSchedule&&Number(scheduleDaysVal)>0&&<div style={{fontSize:"0.78rem",color:C.green,fontWeight:600,marginTop:6}}>🔁 Repeat schedule: every {scheduleDaysVal}d for all {selectedIds.length} crop{selectedIds.length!==1?"s":""}</div>}
                  <div style={{fontSize:"0.78rem",color:"rgba(232,245,233,0.45)",marginTop:6}}>📅 {feedDate} · {feedTime}</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setConfirming(false)} style={{flex:1,padding:"13px",borderRadius:"12px",border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",fontSize:"0.9rem",fontWeight:600,color:"rgba(232,245,233,0.55)",cursor:"pointer"}}>Back</button>
                  <button onClick={()=>{const schedDays=(setSchedule&&Number(scheduleDaysVal)>0)?Number(scheduleDaysVal):null;onFeedAll&&onFeedAll(input.trim(),qty?`${qty} ${unit}`:null,isLiquid&&waterQty?`${waterQty} ${waterUnit}`:null,getFeedDate(),selectedIds,schedDays,{qty,unit,water:waterQty,waterUnit});reset();onClose();}} style={{flex:1,padding:"13px",borderRadius:"12px",border:"none",background:"#f59e0b",fontSize:"0.9rem",fontWeight:700,color:"white",cursor:"pointer"}}>🌿 Feed {selectedIds.length} Crop{selectedIds.length!==1?"s":""}</button>
                </div>
              </div>
            </div>
          )}
        </div>
        )}
      </div>
    </div>
  );
}

// ── Location Panel ─────────────────────────────────────────────
